AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Single-table DynamoDB for product catalog,
  price history, jobs, usage limits and locks.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

Resources:
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table

    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Application
          Value: ProductCatalog

        - Key: Environment
          Value: !Ref Environment

Outputs:
  ProductCatalogTableName:
    Value: !Ref ProductCatalogTable

  ProductCatalogTableArn:
    Value: !GetAtt ProductCatalogTable.Arn

 AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Single-table DynamoDB for product catalog,
  price history, jobs, usage limits and locks.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  EnablePointInTimeRecovery:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  IsPointInTimeRecoveryEnabled:
    Fn::Equals:
      - Ref: EnablePointInTimeRecovery
      - "true"

Resources:
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table

    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

    Properties:
      TableName:
        Fn::Sub: "ProductCatalog-${Environment}"

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S

        - AttributeName: SK
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH

        - AttributeName: SK
          KeyType: RANGE

      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled:
          Fn::If:
            - IsPointInTimeRecoveryEnabled
            - true
            - false

      SSESpecification:
        SSEEnabled: true

      DeletionProtectionEnabled: false

      Tags:
        - Key: Application
          Value: ProductCatalog

        - Key: Environment
          Value:
            Ref: Environment

        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ProductCatalogTableName:
    Description: DynamoDB table name
    Value:
      Ref: ProductCatalogTable

  ProductCatalogTableArn:
    Description: DynamoDB table ARN
    Value:
      Fn::GetAtt:
        - ProductCatalogTable
        - Arn

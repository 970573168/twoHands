AWSTemplateFormatVersion: "2010-09-09"

Description: >
  独立部署的 DeepSeek API Secret 模板。
  用于存储 DeepSeek API Key，供产品目录采集器使用。

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Description: DeepSeek API Key（请从 DeepSeek 控制台获取）
    MinLength: 1

  SecretName:
    Type: String
    Default: "ProductCatalog/DeepSeekApiKey"
    Description: Secrets Manager 中的 Secret 名称前缀

Resources:
  DeepSeekApiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: DeepSeek API key for product catalog discovery
      SecretString: !Sub '{"apiKey":"${DeepSeekApiKey}"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DeepSeekApiSecretArn:
    Description: DeepSeek API Secret ARN
    Value: !Ref DeepSeekApiSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  DeepSeekApiSecretName:
    Description: DeepSeek API Secret 名称
    Value: !Sub "${SecretName}/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-SecretName"

  DeepSeekApiSecretId:
    Description: DeepSeek API Secret ID
    Value: !Ref DeepSeekApiSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretId"

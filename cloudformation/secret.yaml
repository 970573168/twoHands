name: Deploy DeepSeek API Secret

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev/test/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      api_key:
        description: 'DeepSeek API Key (sk-xxx)'
        required: true
        type: secret
      secret_name:
        description: 'Secret name prefix'
        required: false
        default: 'ProductCatalog/DeepSeekApiKey'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-secret:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Context
        run: |
          echo "Repository=$GITHUB_REPOSITORY"
          echo "Ref=$GITHUB_REF"
          echo "Actor=$GITHUB_ACTOR"
          echo "Environment=${{ github.event.inputs.environment }}"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Validate Secret Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/secret.yaml

      - name: Deploy Secret
        run: |
          STACK_NAME="productcatalog-secret-${{ github.event.inputs.environment }}"

          echo "Deploying stack: $STACK_NAME"

          aws cloudformation deploy \
            --template-file cloudformation/secret.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides \
              Environment=${{ github.event.inputs.environment }} \
              DeepSeekApiKey=${{ secrets.DEEPSEEK_API_KEY }} \
              SecretName=${{ github.event.inputs.secret_name }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show Stack Outputs
        if: success()
        run: |
          STACK_NAME="productcatalog-secret-${{ github.event.inputs.environment }}"

          echo "===== SECRET STACK OUTPUTS ====="

          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table

          SECRET_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DeepSeekApiSecretArn'].OutputValue" \
            --output text)

          echo ""
          echo "🔑 Secret ARN: $SECRET_ARN"
          echo ""
          echo "📝 Use this ARN when deploying the main stack:"
          echo "   ParameterKey=DeepSeekSecretArn,ParameterValue=$SECRET_ARN"

      - name: Show Failed Resources
        if: failure()
        run: |
          STACK_NAME="productcatalog-secret-${{ github.event.inputs.environment }}"

          echo "===== FAILED EVENTS ====="

          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason]" \
            --output table

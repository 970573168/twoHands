AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + AI API Secret + Yahoo Auction 抓取器 + 分析工作流 + 型号批量分析器

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test, prod]

  LambdaCodeS3Bucket:
    Type: String

  LambdaCodeS3Key:
    Type: String
    Default: "productcatalog/lambda.zip"

  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  ApiKey:
    Type: String
    NoEcho: true
    Default: ""

  SecretName:
    Type: String
    Default: "ProductCatalog/ApiSecret"

  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  DeployScraper:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  DeployModelAnalyzer:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  ScheduleEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  # 以下参数全部可选，空字符串时使用 Python 代码默认值
  AiModel:           { Type: String, Default: "" }
  ApiUrl:            { Type: String, Default: "" }
  ScheduleIntervalHours:    { Type: String, Default: "" }
  MaxModelsPerRun:          { Type: String, Default: "" }
  MaxConcurrentAnalysis:    { Type: String, Default: "" }
  ModelAnalyzerTimeout:     { Type: String, Default: "" }
  ModelAnalyzerMemory:      { Type: String, Default: "" }
  CategoriesToScan:         { Type: String, Default: "" }
  MaxCategoriesPerRun:      { Type: String, Default: "" }
  MaxBrandsPerCategory:     { Type: String, Default: "" }
  MaxModelsPerBrand:        { Type: String, Default: "" }
  MaxTotalTokens:           { Type: String, Default: "" }
  LambdaTimeoutBuffer:      { Type: String, Default: "" }
  ApiCallDelay:             { Type: String, Default: "" }
  CategoryLimit:            { Type: String, Default: "" }
  BrandLimit:               { Type: String, Default: "" }
  LogRetentionDays:         { Type: String, Default: "" }
  YahooAuctionMaxPages:     { Type: String, Default: "" }
  YahooAuctionRequestTimeout: { Type: String, Default: "" }
  YahooAuctionDebugLogHtml: { Type: String, Default: "", AllowedValues: ["", "true", "false"] }
  YahooAuctionItemsPerPage: { Type: String, Default: "" }
  ModelParseBatchSize:      { Type: String, Default: "" }
  ClosedParseBatchSize:     { Type: String, Default: "" }
  MaxClosedPerModel:        { Type: String, Default: "" }
  DefaultSearchCount:       { Type: String, Default: "" }
  MaxActiveItems:           { Type: String, Default: "" }
  AiRequestTimeout:         { Type: String, Default: "" }
  AiMaxRetries:             { Type: String, Default: "" }
  RequestInterval:          { Type: String, Default: "" }
  ExpectedSellingFeeRate:   { Type: String, Default: "" }
  DefaultShippingCost:      { Type: String, Default: "" }
  DefaultRepairReserveRate: { Type: String, Default: "" }
  MinComparableCount:       { Type: String, Default: "" }
  MaxPriceDeviation:        { Type: String, Default: "" }
  RiskReserveRate:          { Type: String, Default: "" }

Conditions:
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  HasApiKey: !Not [!Equals [!Ref ApiKey, ""]]
  DeployScraperCondition: !Equals [!Ref DeployScraper, "true"]
  DeployModelAnalyzerCondition: !Equals [!Ref DeployModelAnalyzer, "true"]
  ScheduleEnabledCondition: !Equals [!Ref ScheduleEnabled, "true"]

Resources:

  ApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      SecretString: !If [HasApiKey, !Sub '{"apiKey":"${ApiKey}"}', '{"apiKey":"PLACEHOLDER-REPLACE-ME"}']
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK; AttributeType: S
        - AttributeName: SK; AttributeType: S
      KeySchema:
        - AttributeName: PK; KeyType: HASH
        - AttributeName: SK; KeyType: RANGE
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      SSESpecification: { SSEEnabled: true }

  YahooAuctionClosedTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployScraperCondition
    Properties:
      TableName: !Sub "YahooAuctionItems-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: itemID, AttributeType: S }]
      KeySchema: [{ AttributeName: itemID, KeyType: HASH }]
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }
      SSESpecification: { SSEEnabled: true }

  YahooAuctionActiveTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployScraperCondition
    Properties:
      TableName: !Sub "YahooAuctionActiveItems-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: itemID, AttributeType: S }]
      KeySchema: [{ AttributeName: itemID, KeyType: HASH }]
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }
      SSESpecification: { SSEEnabled: true }

  # ========== IAM Roles (省略详细 Policy，结构同前) ==========

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DiscoveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:Query, dynamodb:BatchWriteItem]
                Resource: !GetAtt ProductCatalogTable.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"
              - Effect: Allow
                Action: [logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ProductCatalog-Discovery-${Environment}:*"

  YahooAuctionScraperRole:
    Type: AWS::IAM::Role
    Condition: DeployScraperCondition
    Properties:
      RoleName: !Sub "YahooAuctionScraper-Role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ScraperPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:GetItem, dynamodb:Query, dynamodb:UpdateItem, dynamodb:Scan]
                Resource: [!GetAtt YahooAuctionClosedTable.Arn, !GetAtt YahooAuctionActiveTable.Arn]
              - Effect: Allow
                Action: [logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/YahooAuction*:*

  YahooAuctionAnalyzerRole:
    Type: AWS::IAM::Role
    Condition: DeployScraperCondition
    Properties:
      RoleName: !Sub "YahooAuctionAnalyzer-Role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AnalyzerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:GetItem, dynamodb:Query, dynamodb:UpdateItem, dynamodb:Scan]
                Resource: [!GetAtt YahooAuctionClosedTable.Arn, !GetAtt YahooAuctionActiveTable.Arn]
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"
              - Effect: Allow
                Action: [logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/YahooAuction*:*"

  ModelAnalyzerRole:
    Type: AWS::IAM::Role
    Condition: DeployModelAnalyzerCondition
    Properties:
      RoleName: !Sub "ModelAnalyzer-Role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ModelAnalyzerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:Query, dynamodb:Scan]
                Resource:
                  - !If [DeployMainAppCondition, !GetAtt ProductCatalogTable.Arn, !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ProductCatalog-${Environment}"]
                  - !If [DeployScraperCondition, !GetAtt YahooAuctionClosedTable.Arn, !Ref AWS::NoValue]
                  - !If [DeployScraperCondition, !GetAtt YahooAuctionActiveTable.Arn, !Ref AWS::NoValue]
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"
              - Effect: Allow
                Action: [logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ModelAnalyzer-${Environment}:*"

  # ========== Lambda Functions ==========

  ProductCatalogDiscovery:
    Type: AWS::Lambda::Function
    Condition: DeployMainAppCondition
    Properties:
      FunctionName: !Sub "ProductCatalog-Discovery-${Environment}"
      Runtime: python3.12
      Architectures: [arm64]
      Handler: product_catalog_discovery.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME: !Ref ProductCatalogTable
          SECRET_NAME: !Sub "${SecretName}/${Environment}"
          AI_MODEL: !Ref AiModel
          API_URL: !Ref ApiUrl
          MAX_CATEGORIES: !Ref MaxCategoriesPerRun
          MAX_BRANDS: !Ref MaxBrandsPerCategory
          MAX_MODELS: !Ref MaxModelsPerBrand
          MAX_TOTAL_TOKENS: !Ref MaxTotalTokens
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer
          CATEGORY_LIMIT: !Ref CategoryLimit
          BRAND_LIMIT: !Ref BrandLimit
          API_CALL_DELAY: !Ref ApiCallDelay

  YahooAuctionScraper:
    Type: AWS::Lambda::Function
    Condition: DeployScraperCondition
    Properties:
      FunctionName: !Sub "YahooAuctionScraper-${Environment}"
      Runtime: python3.12
      Architectures: [arm64]
      Handler: yahoo_auction_scraper.lambda_handler
      Timeout: 300
      MemorySize: 512
      Role: !GetAtt YahooAuctionScraperRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME_CLOSED: !Sub "YahooAuctionItems-${Environment}"
          TABLE_NAME_ACTIVE: !Sub "YahooAuctionActiveItems-${Environment}"
          MAX_PAGES: !Ref YahooAuctionMaxPages
          REQUEST_TIMEOUT: !Ref YahooAuctionRequestTimeout
          DEBUG_LOG_HTML: !Ref YahooAuctionDebugLogHtml
          ITEMS_PER_PAGE: !Ref YahooAuctionItemsPerPage

  AuctionAnalyzerFunction:
    Type: AWS::Lambda::Function
    Condition: DeployScraperCondition
    Properties:
      FunctionName: !Sub "YahooAuctionAnalyzer-${Environment}"
      Runtime: python3.12
      Architectures: [arm64]
      Handler: auction_analyzer.lambda_handler
      Timeout: 900
      MemorySize: 1024
      Role: !GetAtt YahooAuctionAnalyzerRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME_ACTIVE: !Sub "YahooAuctionActiveItems-${Environment}"
          TABLE_NAME_CLOSED: !Sub "YahooAuctionItems-${Environment}"
          SECRET_NAME: !Sub "${SecretName}/${Environment}"
          AI_API_URL: !Ref ApiUrl
          AI_MODEL: !Ref AiModel
          AI_REQUEST_TIMEOUT: !Ref AiRequestTimeout
          AI_MAX_RETRIES: !Ref AiMaxRetries
          DEFAULT_SEARCH_COUNT: !Ref DefaultSearchCount
          MAX_ACTIVE_ITEMS: !Ref MaxActiveItems
          MAX_CLOSED_PER_MODEL: !Ref MaxClosedPerModel
          REQUEST_INTERVAL: !Ref RequestInterval
          MODEL_PARSE_BATCH_SIZE: !Ref ModelParseBatchSize
          CLOSED_PARSE_BATCH_SIZE: !Ref ClosedParseBatchSize
          MAX_TOTAL_TOKENS: !Ref MaxTotalTokens
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer
          EXPECTED_SELLING_FEE_RATE: !Ref ExpectedSellingFeeRate
          DEFAULT_SHIPPING_COST: !Ref DefaultShippingCost
          DEFAULT_REPAIR_RESERVE_RATE: !Ref DefaultRepairReserveRate
          MIN_COMPARABLE_COUNT: !Ref MinComparableCount
          MAX_PRICE_DEVIATION: !Ref MaxPriceDeviation
          RISK_RESERVE_RATE: !Ref RiskReserveRate

  ModelAnalyzerFunction:
    Type: AWS::Lambda::Function
    Condition: DeployModelAnalyzerCondition
    Properties:
      FunctionName: !Sub "ModelAnalyzer-${Environment}"
      Runtime: python3.12
      Architectures: [arm64]
      Handler: model_analyzer.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt ModelAnalyzerRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME: !If [DeployMainAppCondition, !Ref ProductCatalogTable, !Sub "ProductCatalog-${Environment}"]
          SECRET_NAME: !Sub "${SecretName}/${Environment}"
          SCHEDULE_ENABLED: !Ref ScheduleEnabled
          AI_API_URL: !Ref ApiUrl
          AI_MODEL: !Ref AiModel
          SCHEDULE_INTERVAL_HOURS: !Ref ScheduleIntervalHours
          MAX_MODELS_PER_RUN: !Ref MaxModelsPerRun
          MAX_CONCURRENT_ANALYSIS: !Ref MaxConcurrentAnalysis
          CATEGORIES_TO_SCAN: !Ref CategoriesToScan
          MAX_TOTAL_TOKENS: !Ref MaxTotalTokens
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer
          AI_REQUEST_TIMEOUT: !Ref AiRequestTimeout
          AI_MAX_RETRIES: !Ref AiMaxRetries

  ModelAnalyzerScheduleRule:
    Type: AWS::Events::Rule
    Condition: ScheduleEnabledCondition
    Properties:
      Name: !Sub "ModelAnalyzer-Schedule-${Environment}"
      ScheduleExpression: !Sub "rate(${ScheduleIntervalHours} hours)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ModelAnalyzerFunction.Arn
          Id: "ModelAnalyzerTarget"

  ModelAnalyzerSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: ScheduleEnabledCondition
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ModelAnalyzerFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ModelAnalyzerScheduleRule.Arn

Outputs:
  ProductCatalogTableName:
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogTable
  DiscoveryLambdaName:
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogDiscovery
  YahooAuctionClosedTableName:
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionClosedTable
  YahooAuctionActiveTableName:
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionActiveTable
  YahooAuctionScraperFunctionName:
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionScraper
  AuctionAnalyzerFunctionName:
    Condition: DeployScraperCondition
    Value: !Ref AuctionAnalyzerFunction
  ModelAnalyzerFunctionName:
    Condition: DeployModelAnalyzerCondition
    Value: !Ref ModelAnalyzerFunction

AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + DeepSeek API Secret（可选）
  通过参数控制部署哪些资源

Parameters:
  # ============ 通用参数 ============
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  # ============ Secret 控制参数 ============
  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 DeepSeek API Secret（首次部署设为 true，后续可设为 false）

  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: DeepSeek API Key（仅在 DeploySecret=true 时需要）

  SecretName:
    Type: String
    Default: "ProductCatalog/DeepSeekApiKey"
    Description: Secrets Manager 中的 Secret 名称前缀

  # ============ 主应用参数 ============
  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署主应用（DynamoDB, SQS, Lambda, Scheduler）

  DeepSeekSecretArn:
    Type: String
    Default: ""
    Description: 已有 Secret 的 ARN（如果 DeployMainApp=true 且不部署新 Secret）

  DeepSeekModel:
    Type: String
    Default: deepseek-v4-flash-260425
    Description: DeepSeek 模型名称

  DeepSeekApiUrl:
    Type: String
    Default: https://ark.cn-beijing.volces.com/api/v3/responses
    Description: DeepSeek API URL

  ScheduleExpression:
    Type: String
    Default: rate(1 day)
    Description: EventBridge Scheduler 表达式

  ScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: 调度器状态

  LambdaReservedConcurrency:
    Type: Number
    Default: 0
    MinValue: 0

  WorkerMaximumConcurrency:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 10

  MaxCategoriesPerRun:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100

  MaxBrandsPerCategory:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100

  MaxModelsPerBrand:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 100

  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 3653

  QueueAlarmThreshold:
    Type: Number
    Default: 100
    MinValue: 1

Conditions:
  # ============ 部署条件 ============
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  
  # Secret 引用条件
  UseExistingSecretArn: !And
    - !Condition DeployMainAppCondition
    - !Not [!Equals [!Ref DeepSeekSecretArn, ""]]
  
  UseNewSecret: !And
    - !Condition DeployMainAppCondition
    - !Not [!Condition DeploySecretCondition]
    - !Equals [!Ref DeepSeekSecretArn, ""]

  # 验证 DeepSeekApiKey 是否提供
  HasApiKey: !Not [!Equals [!Ref DeepSeekApiKey, ""]]

Resources:
  # ============================================
  # 第一部分：DeepSeek API Secret（可选）
  # ============================================
  DeepSeekApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: DeepSeek API key for product catalog discovery
      SecretString: !If
        - HasApiKey
        - !Sub '{"apiKey":"${DeepSeekApiKey}"}'
        - !Sub '{"apiKey":"PLACEHOLDER-REPLACE-ME"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 第二部分：主应用（可选）
  # ============================================
  
  # ---------- DynamoDB 表 ----------
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- SQS 队列 ----------
  ProductCatalogDLQ:
    Type: AWS::SQS::Queue
    Condition: DeployMainAppCondition
    Properties:
      QueueName: !Sub "ProductCatalog-DLQ-${Environment}"
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  ProductCatalogQueue:
    Type: AWS::SQS::Queue
    Condition: DeployMainAppCondition
    Properties:
      QueueName: !Sub "ProductCatalog-Queue-${Environment}"
      VisibilityTimeout: 360
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProductCatalogDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  ProductCatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMainAppCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/ProductCatalog-Worker-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ProductCatalogWorkerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBCatalogAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ProductCatalogTable.Arn
              - Sid: ConsumeAndProduceQueueMessages
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                  - sqs:SendMessage
                Resource: !GetAtt ProductCatalogQueue.Arn
              - Sid: ReadDeepSeekApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !If
                  - UseExistingSecretArn
                  - !Ref DeepSeekSecretArn
                  - !If
                    - DeploySecretCondition
                    - !Ref DeepSeekApiSecret
                    - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*"
              - Sid: WriteLambdaLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${ProductCatalogLogGroup.Arn}:*"

  # ---------- Lambda 函数 ----------
  ProductCatalogWorker:
    Type: AWS::Lambda::Function
    Condition: DeployMainAppCondition
    DependsOn:
      - ProductCatalogLogGroup
    Properties:
      FunctionName: !Sub "ProductCatalog-Worker-${Environment}"
      Description: 通过 DeepSeek AI 发现电子产品品类、品牌和型号
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: index.lambda_handler
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Environment:
        Variables:
          TABLE_NAME: !Ref ProductCatalogTable
          QUEUE_URL: !Ref ProductCatalogQueue
          DEEPSEEK_SECRET_ARN: !If
            - UseExistingSecretArn
            - !Ref DeepSeekSecretArn
            - !If
              - DeploySecretCondition
              - !Ref DeepSeekApiSecret
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}"
          DEEPSEEK_MODEL: !Ref DeepSeekModel
          DEEPSEEK_API_URL: !Ref DeepSeekApiUrl
          MAX_CATEGORIES: !Ref MaxCategoriesPerRun
          MAX_BRANDS: !Ref MaxBrandsPerCategory
          MAX_MODELS: !Ref MaxModelsPerBrand
      Code:
        ZipFile: |
          # (Lambda 代码保持不变，与之前相同)
          # 为了简洁，这里省略，实际使用时复制完整代码

  # ---------- Lambda 事件源映射 ----------
  ProductCatalogEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Condition: DeployMainAppCondition
    Properties:
      EventSourceArn: !GetAtt ProductCatalogQueue.Arn
      FunctionName: !Ref ProductCatalogWorker
      Enabled: true
      BatchSize: 5
      MaximumBatchingWindowInSeconds: 10
      FunctionResponseTypes:
        - ReportBatchItemFailures
      ScalingConfig:
        MaximumConcurrency: !Ref WorkerMaximumConcurrency

  # ---------- Scheduler 角色 ----------
  SchedulerRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-SchedulerRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: SendCatalogDiscoveryTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt ProductCatalogQueue.Arn
                  - !GetAtt ProductCatalogDLQ.Arn

  # ---------- EventBridge Scheduler ----------
  ProductCatalogSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: DeployMainAppCondition
    Properties:
      Name: !Sub "ProductCatalog-Discovery-${Environment}"
      Description: 启动品类、品牌和型号发现任务
      State: !Ref ScheduleState
      ScheduleExpression: !Ref ScheduleExpression
      FlexibleTimeWindow:
        Mode: FLEXIBLE
        MaximumWindowInMinutes: 30
      Target:
        Arn: !GetAtt ProductCatalogQueue.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: !Sub |
          {
            "task_type": "DISCOVER_CATEGORIES",
            "max_items": ${MaxCategoriesPerRun}
          }
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 2
        DeadLetterConfig:
          Arn: !GetAtt ProductCatalogDLQ.Arn

  # ---------- CloudWatch 告警 ----------
  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployMainAppCondition
    Properties:
      AlarmDescription: 产品目录队列积压消息
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ProductCatalogQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref QueueAlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployMainAppCondition
    Properties:
      AlarmDescription: 产品目录死信队列包含失败任务
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ProductCatalogDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  # ============ Secret 输出 ============
  DeepSeekApiSecretArn:
    Description: DeepSeek API Secret ARN
    Condition: DeploySecretCondition
    Value: !Ref DeepSeekApiSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  DeepSeekApiSecretName:
    Description: DeepSeek API Secret 名称
    Condition: DeploySecretCondition
    Value: !Sub "${SecretName}/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-SecretName"

  # ============ 主应用输出 ============
  ProductCatalogTableName:
    Description: DynamoDB 产品目录表名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  ProductCatalogTableArn:
    Description: DynamoDB 产品目录表 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  WorkerLambdaName:
    Description: Lambda Worker 函数名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogWorker
    Export:
      Name: !Sub "${AWS::StackName}-LambdaName"

  WorkerQueueUrl:
    Description: SQS Worker 队列 URL
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogQueue
    Export:
      Name: !Sub "${AWS::StackName}-QueueUrl"

  SchedulerName:
    Description: EventBridge Scheduler 名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogSchedule
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerName"

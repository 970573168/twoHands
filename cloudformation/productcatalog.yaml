AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + AI API Secret + Yahoo Auction 抓取器
  Lambda 代码通过已有 S3 Bucket 部署

Parameters:
  # ============ 通用参数 ============
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  # ============ S3 代码部署参数 ============
  LambdaCodeS3Bucket:
    Type: String
    Description: 已存在的 S3 Bucket 名称，用于存储 Lambda 代码

  LambdaCodeS3Key:
    Type: String
    Default: "productcatalog/lambda.zip"
    Description: S3 中 Lambda 代码的对象键

  # ============ Secret 控制参数 ============
  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 AI API Secret

  ApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: API Key（仅在 DeploySecret=true 时需要）

  SecretName:
    Type: String
    Default: "ProductCatalog/ApiSecret"
    Description: Secrets Manager 中的 Secret 名称前缀

  # ============ 主应用参数 ============
  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署主应用

  AiModel:
    Type: String
    Default: "doubao-seed-2-0-mini-260428"
    Description: AI 模型名称

  ApiUrl:
    Type: String
    Default: "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
    Description: API URL

  MaxCategoriesPerRun:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每次运行发现的最大品类数

  MaxBrandsPerCategory:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每个品类发现的最大品牌数

  MaxModelsPerBrand:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 100
    Description: 每个品牌发现的最大型号数

  # ============ Token 和超时控制 ============
  MaxTotalTokens:
    Type: Number
    Default: 100000
    MinValue: 1000
    MaxValue: 1000000
    Description: 每次运行的最大 Token 用量

  LambdaTimeoutBuffer:
    Type: Number
    Default: 30
    MinValue: 10
    MaxValue: 300
    Description: Lambda 超时缓冲时间（秒）

  # ============ 处理流程控制 ============
  ApiCallDelay:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: API 调用间隔（秒）

  CategoryLimit:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 20
    Description: 每次处理的最大品类数

  BrandLimit:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10
    Description: 每个品类处理的最大品牌数

  # ============ 其他配置 ============
  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 3653
    Description: CloudWatch 日志保留天数

  # ============ Yahoo Auction 抓取器参数 ============
  DeployScraper:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 Yahoo Auction 抓取器

  YahooAuctionClosedBaseUrl:
    Type: String
    Default: "https://auctions.yahoo.co.jp/closedsearch/closedsearch"
    Description: Yahoo 闭拍搜索基础 URL

  YahooAuctionActiveBaseUrl:
    Type: String
    Default: "https://auctions.yahoo.co.jp/search/search"
    Description: Yahoo 活跃拍卖搜索基础 URL

  YahooAuctionDefaultParams:
    Type: String
    Default: "n=50&select=6&mode=3&dest_pref_code=23"
    Description: 默认查询参数（不含 p 和 b）

  YahooAuctionMaxPages:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
    Description: 每次抓取的最大页数

  YahooAuctionRequestTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 120
    Description: HTTP 请求超时（秒）

  YahooAuctionUserAgent:
    Type: String
    Default: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    Description: 请求时使用的 User-Agent

  YahooAuctionClosedTableName:
    Type: String
    Default: "YahooAuctionItems"
    Description: 闭拍 DynamoDB 表名称前缀

  YahooAuctionActiveTableName:
    Type: String
    Default: "YahooAuctionActiveItems"
    Description: 活跃拍卖 DynamoDB 表名称前缀

  YahooAuctionDebugLogHtml:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否记录调试 HTML 日志

  YahooAuctionItemsPerPage:
    Type: Number
    Default: 50
    MinValue: 10
    MaxValue: 100
    Description: 每页显示的商品数量

  # ============ Yahoo Auction 自定义搜索参数（可留空）============
  AuctionParamNew:
    Type: String
    Default: ""
    Description: "新品筛选 (空或1)"

  AuctionParamOffer:
    Type: String
    Default: ""
    Description: "可议价 (空或1)"

  AuctionParamShipping:
    Type: String
    Default: ""
    Description: "配送方式"

  AuctionParamIstatus:
    Type: String
    Default: ""
    Description: "商品状态"

  AuctionParamAbatch:
    Type: String
    Default: ""
    Description: "批次参数"

  AuctionParamLocCd:
    Type: String
    Default: ""
    Description: "地区代码"

  AuctionParamSelect:
    Type: String
    Default: ""
    Description: "select 参数"

  AuctionParamSpec:
    Type: String
    Default: ""
    Description: "规格参数"

  AuctionParamPriceType:
    Type: String
    Default: ""
    Description: "价格类型"

  AuctionParamMin:
    Type: String
    Default: ""
    Description: "最低价格"

  AuctionParamMax:
    Type: String
    Default: ""
    Description: "最高价格"

  AuctionParamCarInspection:
    Type: String
    Default: ""
    Description: "车检参数"

  AuctionParamFixed:
    Type: String
    Default: ""
    Description: "一口价筛选"

  AuctionParamAucminprice:
    Type: String
    Default: ""
    Description: "拍卖最低价格"

  AuctionParamAucmaxprice:
    Type: String
    Default: ""
    Description: "拍卖最高价格"

  AuctionParamAucminBidorbuyPrice:
    Type: String
    Default: ""
    Description: "即决最低价格"

  AuctionParamAucmaxBidorbuyPrice:
    Type: String
    Default: ""
    Description: "即决最高价格"

  AuctionParamLc1:
    Type: String
    Default: ""
    Description: "LC1参数"

  AuctionParamJpypayment:
    Type: String
    Default: ""
    Description: "PayPay等支付方式"

  AuctionParamPoint:
    Type: String
    Default: ""
    Description: "积分参数"

  AuctionParamThumb:
    Type: String
    Default: ""
    Description: "缩略图参数"

  AuctionParamWrappingicon:
    Type: String
    Default: ""
    Description: "包装图标"

  AuctionParamPrivacyDelivery:
    Type: String
    Default: ""
    Description: "隐私配送"

  AuctionParamGiftIcon:
    Type: String
    Default: ""
    Description: "礼品图标"

  AuctionParamCharity:
    Type: String
    Default: ""
    Description: "慈善参数"

  AuctionParamMode:
    Type: String
    Default: ""
    Description: "模式参数"

  AuctionParamN:
    Type: String
    Default: "50"
    Description: "每页数量"

  AuctionParamS1:
    Type: String
    Default: ""
    Description: "排序字段"

  AuctionParamO1:
    Type: String
    Default: ""
    Description: "排序方向 (a/d)"

  AuctionParamMaxSprice:
    Type: String
    Default: ""
    Description: "最高售价"

  AuctionParamType:
    Type: String
    Default: ""
    Description: "类型 (auction/fixed/all)"

Conditions:
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  HasApiKey: !Not [!Equals [!Ref ApiKey, ""]]
  DeployScraperCondition: !Equals [!Ref DeployScraper, "true"]

Resources:
  # ============================================
  # AI API Secret（可选）
  # ============================================
  ApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: AI API key for product catalog discovery
      SecretString: !If
        - HasApiKey
        - !Sub '{"apiKey":"${ApiKey}"}'
        - '{"apiKey":"PLACEHOLDER-REPLACE-ME"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 主应用（可选）
  # ============================================

  # ---------- DynamoDB 表 ----------
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  ProductCatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMainAppCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/ProductCatalog-Discovery-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ProductCatalogDiscoveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBCatalogAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem

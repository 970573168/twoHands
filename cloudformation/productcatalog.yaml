AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + AI API Secret（可选）
  Lambda 代码通过已有 S3 Bucket 部署

Parameters:
  # ============ 通用参数 ============
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  # ============ S3 代码部署参数 ============
  LambdaCodeS3Bucket:
    Type: String
    Description: 已存在的 S3 Bucket 名称，用于存储 Lambda 代码

  LambdaCodeS3Key:
    Type: String
    Default: "productcatalog/lambda.zip"
    Description: S3 中 Lambda 代码的对象键

  # ============ Secret 控制参数 ============
  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 AI API Secret

  ApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: API Key（仅在 DeploySecret=true 时需要）

  SecretName:
    Type: String
    Default: "ProductCatalog/ApiSecret"
    Description: Secrets Manager 中的 Secret 名称前缀

  # ============ 主应用参数 ============
  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署主应用

  AiModel:
    Type: String
    Default: "doubao-seed-2-0-mini-260428"
    Description: AI 模型名称

  ApiUrl:
    Type: String
    Default: "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
    Description: API URL

  MaxCategoriesPerRun:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每次运行发现的最大品类数

  MaxBrandsPerCategory:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每个品类发现的最大品牌数

  MaxModelsPerBrand:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 100
    Description: 每个品牌发现的最大型号数

  # ============ Token 和超时控制 ============
  MaxTotalTokens:
    Type: Number
    Default: 100000
    MinValue: 1000
    MaxValue: 1000000
    Description: 每次运行的最大 Token 用量

  LambdaTimeoutBuffer:
    Type: Number
    Default: 30
    MinValue: 10
    MaxValue: 300
    Description: Lambda 超时缓冲时间（秒）

  # ============ 处理流程控制 ============
  ApiCallDelay:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: API 调用间隔（秒）

  CategoryLimit:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 20
    Description: 每次处理的最大品类数

  BrandLimit:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10
    Description: 每个品类处理的最大品牌数

  # ============ 其他配置 ============
  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 3653
    Description: CloudWatch 日志保留天数

  # ============ Yahoo Auction 抓取器参数 ============
  DeployScraper:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 Yahoo Auction 抓取器

  YahooAuctionBaseUrl:
    Type: String
    Default: "https://auctions.yahoo.co.jp/closedsearch/closedsearch"
    Description: Yahoo 闭拍搜索基础 URL

  YahooAuctionDefaultParams:
    Type: String
    Default: "n=50&select=6&mode=3&dest_pref_code=23"
    Description: 默认查询参数（不含 p 和 b）

  YahooAuctionMaxPages:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
    Description: 每次抓取的最大页数

  YahooAuctionRequestTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 120
    Description: HTTP 请求超时（秒）

  YahooAuctionUserAgent:
    Type: String
    Default: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    Description: 请求时使用的 User-Agent

  YahooAuctionTableName:
    Type: String
    Default: "YahooAuctionItems"
    Description: DynamoDB 表名称前缀

  # ============ Yahoo Auction 自定义搜索参数（可留空）============
  AuctionParamNew:
    Type: String
    Default: ""
    Description: "新品筛选 (空或1)"

  AuctionParamOffer:
    Type: String
    Default: ""
    Description: "可议价 (空或1)"

  AuctionParamShipping:
    Type: String
    Default: ""
    Description: "配送方式"

  AuctionParamIstatus:
    Type: String
    Default: ""
    Description: "商品状态"

  AuctionParamAbatch:
    Type: String
    Default: ""
    Description: "批次参数"

  AuctionParamLocCd:
    Type: String
    Default: ""
    Description: "地区代码"

  AuctionParamSelect:
    Type: String
    Default: ""
    Description: "select 参数（通常已在 DEFAULT_PARAMS 中）"

  AuctionParamSpec:
    Type: String
    Default: ""
    Description: "规格参数"

  AuctionParamPriceType:
    Type: String
    Default: ""
    Description: "价格类型"

  AuctionParamMin:
    Type: String
    Default: ""
    Description: "最低价格"

  AuctionParamMax:
    Type: String
    Default: ""
    Description: "最高价格"

  AuctionParamCarInspection:
    Type: String
    Default: ""
    Description: "车检参数"

  AuctionParamFixed:
    Type: String
    Default: ""
    Description: "一口价筛选"

  AuctionParamAucminprice:
    Type: String
    Default: ""
    Description: "拍卖最低价格"

  AuctionParamAucmaxprice:
    Type: String
    Default: ""
    Description: "拍卖最高价格"

  AuctionParamAucminBidorbuyPrice:
    Type: String
    Default: ""
    Description: "即决最低价格"

  AuctionParamAucmaxBidorbuyPrice:
    Type: String
    Default: ""
    Description: "即决最高价格"

  AuctionParamLc1:
    Type: String
    Default: ""
    Description: "LC1参数"

  AuctionParamJpypayment:
    Type: String
    Default: ""
    Description: "PayPay等支付方式"

  AuctionParamPoint:
    Type: String
    Default: ""
    Description: "积分参数"

  AuctionParamThumb:
    Type: String
    Default: ""
    Description: "缩略图参数"

  AuctionParamWrappingicon:
    Type: String
    Default: ""
    Description: "包装图标"

  AuctionParamPrivacyDelivery:
    Type: String
    Default: ""
    Description: "隐私配送"

  AuctionParamGiftIcon:
    Type: String
    Default: ""
    Description: "礼品图标"

  AuctionParamCharity:
    Type: String
    Default: ""
    Description: "慈善参数"

  AuctionParamMode:
    Type: String
    Default: ""
    Description: "模式参数"

  AuctionParamN:
    Type: String
    Default: "50"
    Description: "每页数量"

  AuctionParamS1:
    Type: String
    Default: ""
    Description: "排序字段"

  AuctionParamO1:
    Type: String
    Default: ""
    Description: "排序方向 (a/d)"

  AuctionParamMaxSprice:
    Type: String
    Default: ""
    Description: "最高售价"

  AuctionParamType:
    Type: String
    Default: ""
    Description: "类型 (auction/fixed/all)"

Conditions:
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  HasApiKey: !Not [!Equals [!Ref ApiKey, ""]]
  DeployScraperCondition: !Equals [!Ref DeployScraper, "true"]

Resources:
  # ============================================
  # AI API Secret（可选）
  # ============================================
  ApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: AI API key for product catalog discovery
      SecretString: !If
        - HasApiKey
        - !Sub '{"apiKey":"${ApiKey}"}'
        - '{"apiKey":"PLACEHOLDER-REPLACE-ME"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 主应用（可选）
  # ============================================

  # ---------- DynamoDB 表 ----------
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  ProductCatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMainAppCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/ProductCatalog-Discovery-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ProductCatalogDiscoveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBCatalogAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ProductCatalogTable.Arn

              - Sid: DynamoDBGSIAccess
                Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub "${ProductCatalogTable.Arn}/index/*"

              - Sid: ReadApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"

              - Sid: WriteLambdaLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${ProductCatalogLogGroup.Arn}:*"

  # ---------- Lambda 函数 ----------
  ProductCatalogDiscovery:
    Type: AWS::Lambda::Function
    Condition: DeployMainAppCondition
    DependsOn:
      - ProductCatalogLogGroup
      - LambdaExecutionRole
    Properties:
      FunctionName: !Sub "ProductCatalog-Discovery-${Environment}"
      Description: 通过 AI 发现电子产品品类、品牌和型号（手动触发）
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: lambda_function.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          # DynamoDB 表名
          TABLE_NAME: !Ref ProductCatalogTable
          
          # API 配置
          SECRET_NAME: !Sub "${SecretName}/${Environment}"
          AI_MODEL: !Ref AiModel
          API_URL: !Ref ApiUrl
          
          # 发现任务配置
          MAX_CATEGORIES: !Ref MaxCategoriesPerRun
          MAX_BRANDS: !Ref MaxBrandsPerCategory
          MAX_MODELS: !Ref MaxModelsPerBrand
          
          # Token 和超时控制
          MAX_TOTAL_TOKENS: !Ref MaxTotalTokens
          LAMBDA_TIMEOUT_SECONDS: "900"
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer
          
          # API 调用参数
          TEMPERATURE: "0.7"
          MAX_TOKENS: "4000"
          TOP_P: "1.0"
          REQUEST_TIMEOUT: "90"
          MAX_RETRIES: "3"
          
          # 系统提示词
          SYSTEM_PROMPT: "You are a helpful assistant that returns data in JSON format."
          
          # 处理流程控制
          CATEGORY_LIMIT: !Ref CategoryLimit
          BRAND_LIMIT: !Ref BrandLimit
          API_CALL_DELAY: !Ref ApiCallDelay
          
          # 数据来源标识
          DATA_SOURCE: "AI_DISCOVERY"
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # =============================================
  # Yahoo Auction 抓取器资源
  # =============================================

  # ---------- DynamoDB 表 ----------
  YahooAuctionItemsTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployScraperCondition
    Properties:
      TableName: !Sub "${YahooAuctionTableName}-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auctionId
          AttributeType: S
      KeySchema:
        - AttributeName: auctionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: YahooAuctionScraper
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  YahooAuctionScraperLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployScraperCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/YahooAuctionScraper-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  YahooAuctionScraperRole:
    Type: AWS::IAM::Role
    Condition: DeployScraperCondition
    Properties:
      RoleName: !Sub "YahooAuctionScraper-Role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: YahooAuctionScraperPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt YahooAuctionItemsTable.Arn
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${YahooAuctionScraperLogGroup.Arn}:*"

  # ---------- Lambda 函数 ----------
  YahooAuctionScraper:
    Type: AWS::Lambda::Function
    Condition: DeployScraperCondition
    DependsOn:
      - YahooAuctionScraperLogGroup
      - YahooAuctionScraperRole
    Properties:
      FunctionName: !Sub "YahooAuctionScraper-${Environment}"
      Description: "Yahoo Auction closed search scraper"
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: yahoo_auction_scraper.lambda_handler
      Timeout: 60
      MemorySize: 256
      Role: !GetAtt YahooAuctionScraperRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          # 基础配置
          BASE_URL: !Ref YahooAuctionBaseUrl
          DEFAULT_PARAMS: !Ref YahooAuctionDefaultParams
          MAX_PAGES: !Ref YahooAuctionMaxPages
          TABLE_NAME: !Sub "${YahooAuctionTableName}-${Environment}"
          REQUEST_TIMEOUT: !Ref YahooAuctionRequestTimeout
          USER_AGENT: !Ref YahooAuctionUserAgent
          
          # 自定义搜索参数（所有参数都会传递给 Lambda）
          AUCTION_PARAM_NEW: !Ref AuctionParamNew
          AUCTION_PARAM_OFFER: !Ref AuctionParamOffer
          AUCTION_PARAM_SHIPPING: !Ref AuctionParamShipping
          AUCTION_PARAM_ISTATUS: !Ref AuctionParamIstatus
          AUCTION_PARAM_ABATCH: !Ref AuctionParamAbatch
          AUCTION_PARAM_LOC_CD: !Ref AuctionParamLocCd
          AUCTION_PARAM_SELECT: !Ref AuctionParamSelect
          AUCTION_PARAM_SPEC: !Ref AuctionParamSpec
          AUCTION_PARAM_PRICE_TYPE: !Ref AuctionParamPriceType
          AUCTION_PARAM_MIN: !Ref AuctionParamMin
          AUCTION_PARAM_MAX: !Ref AuctionParamMax
          AUCTION_PARAM_CAR_INSPECTION: !Ref AuctionParamCarInspection
          AUCTION_PARAM_FIXED: !Ref AuctionParamFixed
          AUCTION_PARAM_AUCMINPRICE: !Ref AuctionParamAucminprice
          AUCTION_PARAM_AUCMAXPRICE: !Ref AuctionParamAucmaxprice
          AUCTION_PARAM_AUCMIN_BIDORBUY_PRICE: !Ref AuctionParamAucminBidorbuyPrice
          AUCTION_PARAM_AUCMAX_BIDORBUY_PRICE: !Ref AuctionParamAucmaxBidorbuyPrice
          AUCTION_PARAM_LC1: !Ref AuctionParamLc1
          AUCTION_PARAM_JPYPAYMENT: !Ref AuctionParamJpypayment
          AUCTION_PARAM_POINT: !Ref AuctionParamPoint
          AUCTION_PARAM_THUMB: !Ref AuctionParamThumb
          AUCTION_PARAM_WRAPPINGICON: !Ref AuctionParamWrappingicon
          AUCTION_PARAM_PRIVACY_DELIVERY: !Ref AuctionParamPrivacyDelivery
          AUCTION_PARAM_GIFT_ICON: !Ref AuctionParamGiftIcon
          AUCTION_PARAM_CHARITY: !Ref AuctionParamCharity
          AUCTION_PARAM_MODE: !Ref AuctionParamMode
          AUCTION_PARAM_N: !Ref AuctionParamN
          AUCTION_PARAM_S1: !Ref AuctionParamS1
          AUCTION_PARAM_O1: !Ref AuctionParamO1
          AUCTION_PARAM_MAX_SPRICE: !Ref AuctionParamMaxSprice
          AUCTION_PARAM_TYPE: !Ref AuctionParamType
      Tags:
        - Key: Application
          Value: YahooAuctionScraper
        - Key: Environment
          Value: !Ref Environment

Outputs:
  # ============ S3 输出 ============
  LambdaCodeBucketName:
    Description: S3 存储 Lambda 代码的存储桶名称
    Condition: DeployMainAppCondition
    Value: !Ref LambdaCodeS3Bucket
    Export:
      Name: !Sub "${AWS::StackName}-CodeBucket"

  LambdaCodeObjectKey:
    Description: S3 中 Lambda 代码对象键
    Condition: DeployMainAppCondition
    Value: !Ref LambdaCodeS3Key
    Export:
      Name: !Sub "${AWS::StackName}-CodeKey"

  # ============ Secret 输出 ============
  ApiSecretArn:
    Description: API Secret ARN
    Condition: DeploySecretCondition
    Value: !Ref ApiSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  ApiSecretName:
    Description: API Secret 名称
    Condition: DeploySecretCondition
    Value: !Sub "${SecretName}/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-SecretName"

  # ============ 主应用输出 ============
  ProductCatalogTableName:
    Description: DynamoDB 产品目录表名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  ProductCatalogTableArn:
    Description: DynamoDB 产品目录表 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  DiscoveryLambdaName:
    Description: Lambda 发现函数名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogDiscovery
    Export:
      Name: !Sub "${AWS::StackName}-LambdaName"

  DiscoveryLambdaArn:
    Description: Lambda 发现函数 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogDiscovery.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

  # ============ Yahoo Auction 抓取器输出 ============
  YahooAuctionTableName:
    Description: Yahoo Auction items DynamoDB table name
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionItemsTable
    Export:
      Name: !Sub "${AWS::StackName}-YahooAuctionTable"

  YahooAuctionScraperFunctionName:
    Description: Yahoo Auction scraper Lambda function name
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionScraper
    Export:
      Name: !Sub "${AWS::StackName}-YahooAuctionScraper"

  # ============ Yahoo Auction 自定义参数输出 ============
  YahooAuctionCustomParams:
    Description: JSON string of all custom auction parameters
    Condition: DeployScraperCondition
    Value: !Sub |
      {
        "new": "${AuctionParamNew}",
        "offer": "${AuctionParamOffer}",
        "shipping": "${AuctionParamShipping}",
        "istatus": "${AuctionParamIstatus}",
        "abatch": "${AuctionParamAbatch}",
        "loc_cd": "${AuctionParamLocCd}",
        "select": "${AuctionParamSelect}",
        "spec": "${AuctionParamSpec}",
        "price_type": "${AuctionParamPriceType}",
        "min": "${AuctionParamMin}",
        "max": "${AuctionParamMax}",
        "car_inspection": "${AuctionParamCarInspection}",
        "fixed": "${AuctionParamFixed}",
        "aucminprice": "${AuctionParamAucminprice}",
        "aucmaxprice": "${AuctionParamAucmaxprice}",
        "aucmin_bidorbuy_price": "${AuctionParamAucminBidorbuyPrice}",
        "aucmax_bidorbuy_price": "${AuctionParamAucmaxBidorbuyPrice}",
        "lc1": "${AuctionParamLc1}",
        "jpypayment": "${AuctionParamJpypayment}",
        "point": "${AuctionParamPoint}",
        "thumb": "${AuctionParamThumb}",
        "wrappingicon": "${AuctionParamWrappingicon}",
        "privacy_delivery": "${AuctionParamPrivacyDelivery}",
        "gift_icon": "${AuctionParamGiftIcon}",
        "charity": "${AuctionParamCharity}",
        "mode": "${AuctionParamMode}",
        "n": "${AuctionParamN}",
        "s1": "${AuctionParamS1}",
        "o1": "${AuctionParamO1}",
        "max_sprice": "${AuctionParamMaxSprice}",
        "type": "${AuctionParamType}"
      }

AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + DeepSeek API Secret（可选）
  Lambda 代码通过 S3 部署

Parameters:
  # ============ 通用参数 ============
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  # ============ S3 代码部署参数 ============
  LambdaCodeS3Bucket:
    Type: String
    Description: S3 存储 Lambda 代码的存储桶名称

  LambdaCodeS3Key:
    Type: String
    Default: "productcatalog/lambda.zip"
    Description: S3 中 Lambda 代码的对象键

  # ============ Secret 控制参数 ============
  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 DeepSeek API Secret

  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: DeepSeek API Key（仅在 DeploySecret=true 时需要）

  SecretName:
    Type: String
    Default: "ProductCatalog/DeepSeekApiKey"
    Description: Secrets Manager 中的 Secret 名称前缀

  # ============ 主应用参数 ============
  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署主应用

  DeepSeekModel:
    Type: String
    Default: deepseek-v4-flash-260425
    Description: DeepSeek 模型名称

  DeepSeekApiUrl:
    Type: String
    Default: https://ark.cn-beijing.volces.com/api/v3/responses
    Description: DeepSeek API URL

  MaxCategoriesPerRun:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每次运行发现的最大品类数

  MaxBrandsPerCategory:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每个品类发现的最大品牌数

  MaxModelsPerBrand:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 100
    Description: 每个品牌发现的最大型号数

  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 3653
    Description: CloudWatch 日志保留天数

Conditions:
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  HasApiKey: !Not [!Equals [!Ref DeepSeekApiKey, ""]]

Resources:
  # ============================================
  # S3 存储 Lambda 代码
  # ============================================
  LambdaCodeBucket:
    Type: AWS::S3::Bucket
    Condition: DeployMainAppCondition
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref LambdaCodeS3Bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 第一部分：DeepSeek API Secret（可选）
  # ============================================
  DeepSeekApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: DeepSeek API key for product catalog discovery
      SecretString: !If
        - HasApiKey
        - !Sub '{"apiKey":"${DeepSeekApiKey}"}'
        - '{"apiKey":"PLACEHOLDER-REPLACE-ME"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 第二部分：主应用（可选）
  # ============================================
  
  # ---------- DynamoDB 表 ----------
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  ProductCatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMainAppCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/ProductCatalog-Discovery-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ProductCatalogDiscoveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBCatalogAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ProductCatalogTable.Arn
              - Sid: DynamoDBGSIAccess
                Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub "${ProductCatalogTable.Arn}/index/*"
              - Sid: ReadDeepSeekApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"
              - Sid: WriteLambdaLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${ProductCatalogLogGroup.Arn}:*"

  # ---------- Lambda 函数 ----------
  ProductCatalogDiscovery:
    Type: AWS::Lambda::Function
    Condition: DeployMainAppCondition
    DependsOn:
      - ProductCatalogLogGroup
    Properties:
      FunctionName: !Sub "ProductCatalog-Discovery-${Environment}"
      Description: 通过 DeepSeek AI 发现电子产品品类、品牌和型号（手动触发）
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: lambda_function.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME: !Ref ProductCatalogTable
          DEEPSEEK_SECRET_NAME: !Sub "${SecretName}/${Environment}"
          DEEPSEEK_MODEL: !Ref DeepSeekModel
          DEEPSEEK_API_URL: !Ref DeepSeekApiUrl
          MAX_CATEGORIES: !Ref MaxCategoriesPerRun
          MAX_BRANDS: !Ref MaxBrandsPerCategory
          MAX_MODELS: !Ref MaxModelsPerBrand
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

Outputs:
  # ============ S3 输出 ============
  LambdaCodeBucketName:
    Description: S3 存储 Lambda 代码的存储桶名称
    Condition: DeployMainAppCondition
    Value: !Ref LambdaCodeBucket
    Export:
      Name: !Sub "${AWS::StackName}-CodeBucket"

  # ============ Secret 输出 ============
  DeepSeekApiSecretArn:
    Description: DeepSeek API Secret ARN
    Condition: DeploySecretCondition
    Value: !Ref DeepSeekApiSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  DeepSeekApiSecretName:
    Description: DeepSeek API Secret 名称
    Condition: DeploySecretCondition
    Value: !Sub "${SecretName}/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-SecretName"

  # ============ 主应用输出 ============
  ProductCatalogTableName:
    Description: DynamoDB 产品目录表名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  ProductCatalogTableArn:
    Description: DynamoDB 产品目录表 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  DiscoveryLambdaName:
    Description: Lambda 发现函数名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogDiscovery
    Export:
      Name: !Sub "${AWS::StackName}-LambdaName"

  DiscoveryLambdaArn:
    Description: Lambda 发现函数 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogDiscovery.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      deploy_secret:
        description: 'Deploy DeepSeek Secret?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      
      deploy_main_app:
        description: 'Deploy Main Application?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      
      api_key:
        description: 'DeepSeek API Key (required if deploy_secret=true)'
        required: false
        type: string
      
      s3_bucket:
        description: 'S3 bucket for Lambda code (required if deploy_main_app=true)'
        required: false
        type: string
        default: 'productcatalog-lambda-code-767076981380'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Create S3 Bucket if not exists
        if: ${{ github.event.inputs.deploy_main_app == 'true' }}
        run: |
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          
          if [ -z "$S3_BUCKET" ]; then
            echo "❌ ERROR: s3_bucket parameter is required when deploy_main_app=true"
            exit 1
          fi
          
          echo "🔍 Checking if S3 bucket exists: $S3_BUCKET"
          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "✅ S3 bucket already exists: $S3_BUCKET"
          else
            echo "📦 Creating S3 bucket: $S3_BUCKET"
            aws s3api create-bucket \
              --bucket "$S3_BUCKET" \
              --region ap-northeast-1 \
              --create-bucket-configuration LocationConstraint=ap-northeast-1
            
            echo "🔒 Enabling versioning..."
            aws s3api put-bucket-versioning \
              --bucket "$S3_BUCKET" \
              --versioning-configuration Status=Enabled
            
            echo "🔐 Enabling encryption..."
            aws s3api put-bucket-encryption \
              --bucket "$S3_BUCKET" \
              --server-side-encryption-configuration '{
                "Rules": [
                  {
                    "ApplyServerSideEncryptionByDefault": {
                      "SSEAlgorithm": "AES256"
                    }
                  }
                ]
              }'
            
            echo "🚫 Blocking public access..."
            aws s3api put-public-access-block \
              --bucket "$S3_BUCKET" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            
            echo "✅ S3 bucket created successfully"
          fi

      - name: Validate Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/productcatalog.yaml

      - name: Deploy Stack
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          
          echo "=========================================="
          echo "Deploying infrastructure stack: $STACK_NAME"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Deploy Secret: ${{ github.event.inputs.deploy_secret }}"
          echo "Deploy Main App: ${{ github.event.inputs.deploy_main_app }}"
          echo "S3 Bucket: $S3_BUCKET"
          echo "=========================================="

          # 构建基础参数
          PARAMS="Environment=${{ github.event.inputs.environment }} \
            DeploySecret=${{ github.event.inputs.deploy_secret }} \
            DeployMainApp=${{ github.event.inputs.deploy_main_app }} \
            MaxCategoriesPerRun=${{ github.event.inputs.max_categories }} \
            MaxBrandsPerCategory=${{ github.event.inputs.max_brands }} \
            MaxModelsPerBrand=${{ github.event.inputs.max_models }}"

          # 添加 S3 相关参数
          if [ "${{ github.event.inputs.deploy_main_app }}" = "true" ]; then
            if [ -z "$S3_BUCKET" ]; then
              echo "❌ ERROR: s3_bucket is required when deploy_main_app=true"
              exit 1
            fi
            
            PARAMS="$PARAMS \
              LambdaCodeS3Bucket=$S3_BUCKET \
              LambdaCodeS3Key=productcatalog/lambda-$TIMESTAMP.zip"
            
            echo "📦 Lambda code will be deployed from: s3://$S3_BUCKET/productcatalog/lambda-$TIMESTAMP.zip"
          fi

          # 如果部署 Secret，添加 API Key
          if [ "${{ github.event.inputs.deploy_secret }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.api_key }}" ]; then
              PARAMS="$PARAMS DeepSeekApiKey=${{ github.event.inputs.api_key }}"
              echo "✅ API Key provided"
            else
              echo "⚠️ WARNING: deploy_secret=true but no API key provided"
              echo "   Secret will be created with placeholder value"
            fi
          fi

          echo ""
          echo "📋 Parameters:"
          echo "$PARAMS" | tr ' ' '\n' | grep -v '^$'
          echo ""

          # 部署 CloudFormation 栈
          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides $PARAMS \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Build and Upload Lambda Code
        if: ${{ github.event.inputs.deploy_main_app == 'true' && success() }}
        run: |
          echo "🔨 Building Lambda package..."
          
          # 构建 Lambda 包
          chmod +x build.sh
          ./build.sh
          
          # 上传到 S3
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          
          echo "📤 Uploading Lambda code to S3..."
          echo "Bucket: $S3_BUCKET"
          echo "Key: $S3_KEY"
          
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          # 更新 Lambda 函数代码
          FUNCTION_NAME="ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          
          echo "🔄 Updating Lambda function: $FUNCTION_NAME"
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "$S3_BUCKET" \
            --s3-key "$S3_KEY"
          
          echo "⏳ Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          
          echo "✅ Lambda function updated with initial code"
          
          # 更新 CloudFormation 栈以使用正确的 S3 键
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "🔄 Updating CloudFormation stack with correct S3 key..."
          aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --use-previous-template \
            --parameters \
              ParameterKey=Environment,UsePreviousValue=true \
              ParameterKey=DeploySecret,UsePreviousValue=true \
              ParameterKey=DeployMainApp,UsePreviousValue=true \
              ParameterKey=DeepSeekModel,UsePreviousValue=true \
              ParameterKey=DeepSeekApiUrl,UsePreviousValue=true \
              ParameterKey=MaxCategoriesPerRun,UsePreviousValue=true \
              ParameterKey=MaxBrandsPerCategory,UsePreviousValue=true \
              ParameterKey=MaxModelsPerBrand,UsePreviousValue=true \
              ParameterKey=LogRetentionDays,UsePreviousValue=true \
              ParameterKey=LambdaCodeS3Bucket,ParameterValue=$S3_BUCKET \
              ParameterKey=LambdaCodeS3Key,ParameterValue=$S3_KEY \
            --capabilities CAPABILITY_NAMED_IAM
          
          echo "⏳ Waiting for stack update to complete..."
          aws cloudformation wait stack-update-complete \
            --stack-name "$STACK_NAME"
          
          echo "✅ Stack updated with correct S3 key"

      - name: Show Stack Outputs
        if: success()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "===== STACK OUTPUTS ====="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
          
          echo ""
          echo "===== DEPLOYMENT SUMMARY ====="
          echo "🏗️ Stack: $STACK_NAME"
          echo "📦 S3 Bucket: ${{ github.event.inputs.s3_bucket }}"
          echo "⚡ Lambda: ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          echo "🗄️ DynamoDB: ProductCatalog-${{ github.event.inputs.environment }}"

      - name: Show Failed Resources
        if: failure()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "===== FAILED EVENTS ====="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason,Timestamp]" \
            --output table
          
          echo ""
          echo "===== LAST 10 EVENTS ====="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --max-items 10 \
            --query "StackEvents[].[LogicalResourceId,ResourceStatus,ResourceStatusReason,Timestamp]" \
            --output table

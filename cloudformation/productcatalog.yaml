AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + AI API Secret + Yahoo Auction 抓取器 + 分析工作流
  Lambda 代码通过已有 S3 Bucket 部署

Parameters:
  # ============ 通用参数 ============
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  # ============ S3 代码部署参数 ============
  LambdaCodeS3Bucket:
    Type: String
    Description: 已存在的 S3 Bucket 名称，用于存储 Lambda 代码

  LambdaCodeS3Key:
    Type: String
    Default: "productcatalog/lambda.zip"
    Description: S3 中 Lambda 代码的对象键

  # ============ Secret 控制参数 ============
  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 AI API Secret

  ApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: API Key（仅在 DeploySecret=true 时需要）

  SecretName:
    Type: String
    Default: "ProductCatalog/ApiSecret"
    Description: Secrets Manager 中的 Secret 名称前缀

  # ============ 主应用参数 ============
  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署主应用

  AiModel:
    Type: String
    Default: "doubao-seed-2-0-mini-260428"
    Description: AI 模型名称

  ApiUrl:
    Type: String
    Default: "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
    Description: API URL

  MaxCategoriesPerRun:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每次运行发现的最大品类数

  MaxBrandsPerCategory:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每个品类发现的最大品牌数

  MaxModelsPerBrand:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 100
    Description: 每个品牌发现的最大型号数

  # ============ Token 和超时控制 ============
  MaxTotalTokens:
    Type: Number
    Default: 50000
    MinValue: 10000
    MaxValue: 1000000
    Description: 每次运行的最大 Token 用量（Analyzer 默认50000，ProductCatalog 默认100000）

  LambdaTimeoutBuffer:
    Type: Number
    Default: 30
    MinValue: 10
    MaxValue: 300
    Description: Lambda 超时缓冲时间（秒）

  # ============ 处理流程控制 ============
  ApiCallDelay:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: API 调用间隔（秒）

  CategoryLimit:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 20
    Description: 每次处理的最大品类数

  BrandLimit:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10
    Description: 每个品类处理的最大品牌数

  # ============ 其他配置 ============
  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 3653
    Description: CloudWatch 日志保留天数

  # ============ Yahoo Auction 抓取器参数 ============
  DeployScraper:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 Yahoo Auction 抓取器和分析器

  YahooAuctionMaxPages:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
    Description: 每次抓取的最大页数

  YahooAuctionRequestTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 120
    Description: HTTP 请求超时（秒）

  YahooAuctionDebugLogHtml:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否记录调试 HTML 日志

  YahooAuctionItemsPerPage:
    Type: Number
    Default: 50
    MinValue: 10
    MaxValue: 100
    Description: 每页显示的商品数量

  # ============ Yahoo Auction Analyzer 特定参数 ============
  ModelParseBatchSize:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 50
    Description: 活跃商品型号解析批次大小（每批最多处理的商品数）

  ClosedParseBatchSize:
    Type: Number
    Default: 15
    MinValue: 1
    MaxValue: 50
    Description: 闭拍商品型号解析批次大小

  MaxClosedPerModel:
    Type: Number
    Default: 50
    MinValue: 10
    MaxValue: 200
    Description: 每个型号搜索的最多闭拍商品数

  DefaultSearchCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 20
    Description: 默认搜索活跃商品数量

  MaxActiveItems:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 50
    Description: 最大活跃商品数量

  AiRequestTimeout:
    Type: Number
    Default: 60
    MinValue: 30
    MaxValue: 300
    Description: AI API 请求超时（秒）

  AiMaxRetries:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 5
    Description: AI API 最大重试次数

  RequestInterval:
    Type: Number
    Default: 1.0
    MinValue: 0.1
    MaxValue: 5.0
    Description: 请求间隔（秒）

  # ============ 估价相关参数 ============
  ExpectedSellingFeeRate:
    Type: Number
    Default: 0.10
    MinValue: 0
    MaxValue: 1
    Description: 预期交易费率（如 0.10 = 10%）

  DefaultShippingCost:
    Type: Number
    Default: 1500
    MinValue: 0
    MaxValue: 10000
    Description: 默认运费（円）

  DefaultRepairReserveRate:
    Type: Number
    Default: 0.05
    MinValue: 0
    MaxValue: 1
    Description: 默认维修准备金率

  MinComparableCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10
    Description: 最少可比商品数量（用于估价）

  MaxPriceDeviation:
    Type: Number
    Default: 1.5
    MinValue: 1
    MaxValue: 5
    Description: 最大价格偏差倍数（用于筛选异常值）

  RiskReserveRate:
    Type: Number
    Default: 0.03
    MinValue: 0
    MaxValue: 1
    Description: 风险准备金率

  # ============ Yahoo Auction 自定义搜索参数（可留空，不覆盖代码默认值）============
  AuctionParamNew:
    Type: String
    Default: ""
    Description: "新品筛选 (空或1) - 可选"

  AuctionParamOffer:
    Type: String
    Default: ""
    Description: "可议价 (空或1) - 可选"

  AuctionParamShipping:
    Type: String
    Default: ""
    Description: "配送方式 - 可选"

  AuctionParamIstatus:
    Type: String
    Default: ""
    Description: "商品状态 - 可选"

  AuctionParamAbatch:
    Type: String
    Default: ""
    Description: "批次参数 - 可选"

  AuctionParamLocCd:
    Type: String
    Default: ""
    Description: "地区代码 - 可选"

  AuctionParamSelect:
    Type: String
    Default: ""
    Description: "select 参数 - 可选"

  AuctionParamSpec:
    Type: String
    Default: ""
    Description: "规格参数 - 可选"

  AuctionParamPriceType:
    Type: String
    Default: ""
    Description: "价格类型 - 可选"

  AuctionParamMin:
    Type: String
    Default: ""
    Description: "最低价格 - 可选"

  AuctionParamMax:
    Type: String
    Default: ""
    Description: "最高价格 - 可选"

  AuctionParamCarInspection:
    Type: String
    Default: ""
    Description: "车检参数 - 可选"

  AuctionParamFixed:
    Type: String
    Default: ""
    Description: "一口价筛选 - 可选"

  AuctionParamAucminprice:
    Type: String
    Default: ""
    Description: "拍卖最低价格 - 可选"

  AuctionParamAucmaxprice:
    Type: String
    Default: ""
    Description: "拍卖最高价格 - 可选"

  AuctionParamAucminBidorbuyPrice:
    Type: String
    Default: ""
    Description: "即决最低价格 - 可选"

  AuctionParamAucmaxBidorbuyPrice:
    Type: String
    Default: ""
    Description: "即决最高价格 - 可选"

  AuctionParamLc1:
    Type: String
    Default: ""
    Description: "LC1参数 - 可选"

  AuctionParamJpypayment:
    Type: String
    Default: ""
    Description: "PayPay等支付方式 - 可选"

  AuctionParamPoint:
    Type: String
    Default: ""
    Description: "积分参数 - 可选"

  AuctionParamThumb:
    Type: String
    Default: ""
    Description: "缩略图参数 - 可选"

  AuctionParamWrappingicon:
    Type: String
    Default: ""
    Description: "包装图标 - 可选"

  AuctionParamPrivacyDelivery:
    Type: String
    Default: ""
    Description: "隐私配送 - 可选"

  AuctionParamGiftIcon:
    Type: String
    Default: ""
    Description: "礼品图标 - 可选"

  AuctionParamCharity:
    Type: String
    Default: ""
    Description: "慈善参数 - 可选"

  AuctionParamMode:
    Type: String
    Default: ""
    Description: "模式参数 - 可选（代码默认值为3）"

  AuctionParamN:
    Type: String
    Default: ""
    Description: "每页数量 - 可选（代码默认值为60）"

  AuctionParamS1:
    Type: String
    Default: ""
    Description: "排序字段 - 可选（代码默认值为end）"

  AuctionParamO1:
    Type: String
    Default: ""
    Description: "排序方向 - 可选（代码默认值为a）"

  AuctionParamMaxSprice:
    Type: String
    Default: ""
    Description: "最高售价 - 可选"

  AuctionParamType:
    Type: String
    Default: ""
    Description: "类型 (auction/fixed/all) - 可选"

Conditions:
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  HasApiKey: !Not [!Equals [!Ref ApiKey, ""]]
  DeployScraperCondition: !Equals [!Ref DeployScraper, "true"]

Resources:
  # ============================================
  # AI API Secret（可选）
  # ============================================
  ApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: AI API key for product catalog discovery
      SecretString: !If
        - HasApiKey
        - !Sub '{"apiKey":"${ApiKey}"}'
        - '{"apiKey":"PLACEHOLDER-REPLACE-ME"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 主应用（可选）
  # ============================================

  # ---------- DynamoDB 表 ----------
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  ProductCatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMainAppCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/ProductCatalog-Discovery-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ProductCatalogDiscoveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBCatalogAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ProductCatalogTable.Arn

              - Sid: ReadApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"

              - Sid: WriteLambdaLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${ProductCatalogLogGroup.Arn}:*"

  # ---------- Lambda 函数 ----------
  ProductCatalogDiscovery:
    Type: AWS::Lambda::Function
    Condition: DeployMainAppCondition
    DependsOn:
      - ProductCatalogLogGroup
      - LambdaExecutionRole
    Properties:
      FunctionName: !Sub "ProductCatalog-Discovery-${Environment}"
      Description: 通过 AI 发现电子产品品类、品牌和型号（手动触发）
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: lambda_function.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME: !Ref ProductCatalogTable
          SECRET_NAME: !Sub "${SecretName}/${Environment}"
          AI_MODEL: !Ref AiModel
          API_URL: !Ref ApiUrl
          MAX_CATEGORIES: !Ref MaxCategoriesPerRun
          MAX_BRANDS: !Ref MaxBrandsPerCategory
          MAX_MODELS: !Ref MaxModelsPerBrand
          MAX_TOTAL_TOKENS: "100000"
          LAMBDA_TIMEOUT_SECONDS: "900"
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer
          CATEGORY_LIMIT: !Ref CategoryLimit
          BRAND_LIMIT: !Ref BrandLimit
          API_CALL_DELAY: !Ref ApiCallDelay
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # =============================================
  # Yahoo Auction 抓取器资源
  # =============================================

  # ---------- DynamoDB 表：闭拍数据 ----------
  YahooAuctionClosedTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployScraperCondition
    Properties:
      TableName: !Sub "YahooAuctionItems-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: itemID
          AttributeType: S
      KeySchema:
        - AttributeName: itemID
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: YahooAuctionScraper
        - Key: Environment
          Value: !Ref Environment
        - Key: Type
          Value: Closed

  # ---------- DynamoDB 表：活跃拍卖数据 ----------
  YahooAuctionActiveTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployScraperCondition
    Properties:
      TableName: !Sub "YahooAuctionActiveItems-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: itemID
          AttributeType: S
      KeySchema:
        - AttributeName: itemID
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: YahooAuctionScraper
        - Key: Environment
          Value: !Ref Environment
        - Key: Type
          Value: Active

  # ---------- CloudWatch Logs ----------
  YahooAuctionScraperLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployScraperCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/YahooAuctionScraper-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  YahooAuctionAnalyzerLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployScraperCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/YahooAuctionAnalyzer-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色：抓取器 ----------
  YahooAuctionScraperRole:
    Type: AWS::IAM::Role
    Condition: DeployScraperCondition
    Properties:
      RoleName: !Sub "YahooAuctionScraper-Role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: YahooAuctionScraperPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt YahooAuctionClosedTable.Arn
                  - !GetAtt YahooAuctionActiveTable.Arn
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "${YahooAuctionScraperLogGroup.Arn}:*"
                  - !Sub "${YahooAuctionAnalyzerLogGroup.Arn}:*"

  # ---------- Lambda 执行角色：分析器（扩展权限） ----------
  YahooAuctionAnalyzerRole:
    Type: AWS::IAM::Role
    Condition: DeployScraperCondition
    Properties:
      RoleName: !Sub "YahooAuctionAnalyzer-Role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: YahooAuctionAnalyzerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBFullAccess
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt YahooAuctionClosedTable.Arn
                  - !GetAtt YahooAuctionActiveTable.Arn

              - Sid: ReadApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"

              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "${YahooAuctionScraperLogGroup.Arn}:*"
                  - !Sub "${YahooAuctionAnalyzerLogGroup.Arn}:*"

  # ---------- Lambda 函数：抓取器 ----------
  YahooAuctionScraper:
    Type: AWS::Lambda::Function
    Condition: DeployScraperCondition
    DependsOn:
      - YahooAuctionScraperLogGroup
      - YahooAuctionScraperRole
    Properties:
      FunctionName: !Sub "YahooAuctionScraper-${Environment}"
      Description: "Yahoo Auction closed & active search scraper"
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: yahoo_auction_scraper.lambda_handler
      Timeout: 300
      MemorySize: 512
      Role: !GetAtt YahooAuctionScraperRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          TABLE_NAME_CLOSED: !Sub "YahooAuctionItems-${Environment}"
          TABLE_NAME_ACTIVE: !Sub "YahooAuctionActiveItems-${Environment}"
          MAX_PAGES: !Ref YahooAuctionMaxPages
          REQUEST_TIMEOUT: !Ref YahooAuctionRequestTimeout
          DEBUG_LOG_HTML: !Ref YahooAuctionDebugLogHtml
          ITEMS_PER_PAGE: !Ref YahooAuctionItemsPerPage
          AUCTION_PARAM_NEW: !Ref AuctionParamNew
          AUCTION_PARAM_OFFER: !Ref AuctionParamOffer
          AUCTION_PARAM_SHIPPING: !Ref AuctionParamShipping
          AUCTION_PARAM_ISTATUS: !Ref AuctionParamIstatus
          AUCTION_PARAM_ABATCH: !Ref AuctionParamAbatch
          AUCTION_PARAM_LOC_CD: !Ref AuctionParamLocCd
          AUCTION_PARAM_SELECT: !Ref AuctionParamSelect
          AUCTION_PARAM_SPEC: !Ref AuctionParamSpec
          AUCTION_PARAM_PRICE_TYPE: !Ref AuctionParamPriceType
          AUCTION_PARAM_MIN: !Ref AuctionParamMin
          AUCTION_PARAM_MAX: !Ref AuctionParamMax
          AUCTION_PARAM_CAR_INSPECTION: !Ref AuctionParamCarInspection
          AUCTION_PARAM_FIXED: !Ref AuctionParamFixed
          AUCTION_PARAM_AUCMINPRICE: !Ref AuctionParamAucminprice
          AUCTION_PARAM_AUCMAXPRICE: !Ref AuctionParamAucmaxprice
          AUCTION_PARAM_AUCMIN_BIDORBUY_PRICE: !Ref AuctionParamAucminBidorbuyPrice
          AUCTION_PARAM_AUCMAX_BIDORBUY_PRICE: !Ref AuctionParamAucmaxBidorbuyPrice
          AUCTION_PARAM_LC1: !Ref AuctionParamLc1
          AUCTION_PARAM_JPYPAYMENT: !Ref AuctionParamJpypayment
          AUCTION_PARAM_POINT: !Ref AuctionParamPoint
          AUCTION_PARAM_THUMB: !Ref AuctionParamThumb
          AUCTION_PARAM_WRAPPINGICON: !Ref AuctionParamWrappingicon
          AUCTION_PARAM_PRIVACY_DELIVERY: !Ref AuctionParamPrivacyDelivery
          AUCTION_PARAM_GIFT_ICON: !Ref AuctionParamGiftIcon
          AUCTION_PARAM_CHARITY: !Ref AuctionParamCharity
          AUCTION_PARAM_MODE: !Ref AuctionParamMode
          AUCTION_PARAM_N: !Ref AuctionParamN
          AUCTION_PARAM_S1: !Ref AuctionParamS1
          AUCTION_PARAM_O1: !Ref AuctionParamO1
          AUCTION_PARAM_MAX_SPRICE: !Ref AuctionParamMaxSprice
          AUCTION_PARAM_TYPE: !Ref AuctionParamType
      Tags:
        - Key: Application
          Value: YahooAuctionScraper
        - Key: Environment
          Value: !Ref Environment

  # ---------- Lambda 函数：分析器 ----------
  AuctionAnalyzerFunction:
    Type: AWS::Lambda::Function
    Condition: DeployScraperCondition
    DependsOn:
      - YahooAuctionAnalyzerLogGroup
      - YahooAuctionAnalyzerRole
    Properties:
      FunctionName: !Sub "YahooAuctionAnalyzer-${Environment}"
      Description: "Yahoo Auction 商品分析工作流（支持 AI 估价、模型解析、权限完整）"
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: auction_analyzer.lambda_handler
      Timeout: 900
      MemorySize: 1024
      Role: !GetAtt YahooAuctionAnalyzerRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          # ========== DynamoDB 配置 ==========
          TABLE_NAME_ACTIVE: !Sub "YahooAuctionActiveItems-${Environment}"
          TABLE_NAME_CLOSED: !Sub "YahooAuctionItems-${Environment}"

          # ========== Secrets Manager 配置 ==========
          SECRET_NAME: !Sub "${SecretName}/${Environment}"

          # ========== AI API 配置 ==========
          AI_API_URL: !Ref ApiUrl
          AI_MODEL: !Ref AiModel
          AI_REQUEST_TIMEOUT: !Ref AiRequestTimeout
          AI_MAX_RETRIES: !Ref AiMaxRetries

          # ========== 搜索和抓取配置 ==========
          DEFAULT_SEARCH_COUNT: !Ref DefaultSearchCount
          MAX_ACTIVE_ITEMS: !Ref MaxActiveItems
          MAX_CLOSED_PER_MODEL: !Ref MaxClosedPerModel
          REQUEST_INTERVAL: !Ref RequestInterval
          INCLUDE_PAYPAY: "false"

          # ========== 批量处理配置（新增） ==========
          MODEL_PARSE_BATCH_SIZE: !Ref ModelParseBatchSize
          CLOSED_PARSE_BATCH_SIZE: !Ref ClosedParseBatchSize

          # ========== Token 和超时控制 ==========
          MAX_TOTAL_TOKENS: !Ref MaxTotalTokens
          LAMBDA_TIMEOUT_SECONDS: "840"
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer

          # ========== 估价配置 ==========
          EXPECTED_SELLING_FEE_RATE: !Ref ExpectedSellingFeeRate
          DEFAULT_SHIPPING_COST: !Ref DefaultShippingCost
          DEFAULT_REPAIR_RESERVE_RATE: !Ref DefaultRepairReserveRate
          MIN_COMPARABLE_COUNT: !Ref MinComparableCount
          MAX_PRICE_DEVIATION: !Ref MaxPriceDeviation
          RISK_RESERVE_RATE: !Ref RiskReserveRate
      Tags:
        - Key: Application
          Value: YahooAuctionAnalyzer
        - Key: Environment
          Value: !Ref Environment

Outputs:
  # ============ S3 输出 ============
  LambdaCodeBucketName:
    Description: S3 存储 Lambda 代码的存储桶名称
    Value: !Ref LambdaCodeS3Bucket

  LambdaCodeObjectKey:
    Description: S3 中 Lambda 代码对象键
    Value: !Ref LambdaCodeS3Key

  # ============ Secret 输出 ============
  ApiSecretArn:
    Description: API Secret ARN
    Condition: DeploySecretCondition
    Value: !Ref ApiSecret

  ApiSecretName:
    Description: API Secret 名称
    Condition: DeploySecretCondition
    Value: !Sub "${SecretName}/${Environment}"

  # ============ 主应用输出 ============
  ProductCatalogTableName:
    Description: DynamoDB 产品目录表名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogTable

  ProductCatalogTableArn:
    Description: DynamoDB 产品目录表 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogTable.Arn

  DiscoveryLambdaName:
    Description: Lambda 发现函数名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogDiscovery

  DiscoveryLambdaArn:
    Description: Lambda 发现函数 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogDiscovery.Arn

  # ============ Yahoo Auction 输出 ============
  YahooAuctionClosedTableName:
    Description: Yahoo Auction closed items DynamoDB table name
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionClosedTable

  YahooAuctionClosedTableArn:
    Description: Yahoo Auction closed items DynamoDB table ARN
    Condition: DeployScraperCondition
    Value: !GetAtt YahooAuctionClosedTable.Arn

  YahooAuctionActiveTableName:
    Description: Yahoo Auction active items DynamoDB table name
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionActiveTable

  YahooAuctionActiveTableArn:
    Description: Yahoo Auction active items DynamoDB table ARN
    Condition: DeployScraperCondition
    Value: !GetAtt YahooAuctionActiveTable.Arn

  YahooAuctionScraperFunctionName:
    Description: Yahoo Auction scraper Lambda function name
    Condition: DeployScraperCondition
    Value: !Ref YahooAuctionScraper

  YahooAuctionScraperFunctionArn:
    Description: Yahoo Auction scraper Lambda function ARN
    Condition: DeployScraperCondition
    Value: !GetAtt YahooAuctionScraper.Arn

  AuctionAnalyzerFunctionName:
    Description: Yahoo Auction analyzer Lambda function name
    Condition: DeployScraperCondition
    Value: !Ref AuctionAnalyzerFunction

  AuctionAnalyzerFunctionArn:
    Description: Yahoo Auction analyzer Lambda function ARN
    Condition: DeployScraperCondition
    Value: !GetAtt AuctionAnalyzerFunction.Arn

  YahooAuctionScraperRoleArn:
    Description: Yahoo Auction scraper execution role ARN
    Condition: DeployScraperCondition
    Value: !GetAtt YahooAuctionScraperRole.Arn

  YahooAuctionAnalyzerRoleArn:
    Description: Yahoo Auction analyzer execution role ARN
    Condition: DeployScraperCondition
    Value: !GetAtt YahooAuctionAnalyzerRole.Arn

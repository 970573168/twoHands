AWSTemplateFormatVersion: "2010-09-09"

Description: >
  电子产品目录采集器 + DeepSeek API Secret（可选）
  Lambda 代码通过已有 S3 Bucket 部署

Parameters:
  # ============ 通用参数 ============
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: 环境名称

  # ============ S3 代码部署参数 ============
  LambdaCodeS3Bucket:
    Type: String
    Description: 已存在的 S3 Bucket 名称，用于存储 Lambda 代码

  LambdaCodeS3Key:
    Type: String
    Default: "productcatalog/lambda.zip"
    Description: S3 中 Lambda 代码的对象键

  # ============ Secret 控制参数 ============
  DeploySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署 DeepSeek API Secret

  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: DeepSeek API Key（仅在 DeploySecret=true 时需要）

  SecretName:
    Type: String
    Default: "ProductCatalog/DeepSeekApiKey"
    Description: Secrets Manager 中的 Secret 名称前缀

  # ============ 主应用参数 ============
  DeployMainApp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: 是否部署主应用

  DeepSeekModel:
    Type: String
    Default: deepseek-v4-flash-260425
    Description: DeepSeek 模型名称

  DeepSeekApiUrl:
    Type: String
    Default: "https://ark.cn-beijing.volces.com/api/v3/responses"
    Description: DeepSeek API URL

  MaxCategoriesPerRun:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每次运行发现的最大品类数

  MaxBrandsPerCategory:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 100
    Description: 每个品类发现的最大品牌数

  MaxModelsPerBrand:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 100
    Description: 每个品牌发现的最大型号数

  # ============ Token 和超时控制 ============
  MaxTotalTokens:
    Type: Number
    Default: 100000
    MinValue: 1000
    MaxValue: 1000000
    Description: 每次运行的最大 Token 用量

  LambdaTimeoutBuffer:
    Type: Number
    Default: 30
    MinValue: 10
    MaxValue: 300
    Description: Lambda 超时缓冲时间（秒）

  # ============ 处理流程控制 ============
  ApiCallDelay:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: API 调用间隔（秒）

  CategoryLimit:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 20
    Description: 每次处理的最大品类数

  BrandLimit:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10
    Description: 每个品类处理的最大品牌数

  # ============ 其他配置 ============
  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 3653
    Description: CloudWatch 日志保留天数

Conditions:
  DeploySecretCondition: !Equals [!Ref DeploySecret, "true"]
  DeployMainAppCondition: !Equals [!Ref DeployMainApp, "true"]
  HasApiKey: !Not [!Equals [!Ref DeepSeekApiKey, ""]]

Resources:
  # ============================================
  # DeepSeek API Secret（可选）
  # ============================================
  DeepSeekApiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: DeploySecretCondition
    Properties:
      Name: !Sub "${SecretName}/${Environment}"
      Description: DeepSeek API key for product catalog discovery
      SecretString: !If
        - HasApiKey
        - !Sub '{"apiKey":"${DeepSeekApiKey}"}'
        - '{"apiKey":"PLACEHOLDER-REPLACE-ME"}'
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # 主应用（可选）
  # ============================================

  # ---------- DynamoDB 表 ----------
  ProductCatalogTable:
    Type: AWS::DynamoDB::Table
    Condition: DeployMainAppCondition
    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

  # ---------- CloudWatch Logs ----------
  ProductCatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMainAppCondition
    Properties:
      LogGroupName: !Sub "/aws/lambda/ProductCatalog-Discovery-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------- Lambda 执行角色 ----------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: DeployMainAppCondition
    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ProductCatalogDiscoveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBCatalogAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ProductCatalogTable.Arn

              - Sid: DynamoDBGSIAccess
                Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub "${ProductCatalogTable.Arn}/index/*"

              - Sid: ReadDeepSeekApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}/${Environment}-*"

              - Sid: WriteLambdaLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${ProductCatalogLogGroup.Arn}:*"

  # ---------- Lambda 函数 ----------
  ProductCatalogDiscovery:
    Type: AWS::Lambda::Function
    Condition: DeployMainAppCondition
    DependsOn:
      - ProductCatalogLogGroup
      - LambdaExecutionRole
    Properties:
      FunctionName: !Sub "ProductCatalog-Discovery-${Environment}"
      Description: 通过 AI 发现电子产品品类、品牌和型号（手动触发）
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: lambda_function.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          # DynamoDB 表名
          TABLE_NAME: !Ref ProductCatalogTable
          
          # API 配置
          DEEPSEEK_SECRET_NAME: !Sub "${SecretName}/${Environment}"
          DEEPSEEK_MODEL: !Ref DeepSeekModel
          DEEPSEEK_API_URL: !Ref DeepSeekApiUrl
          
          # 发现任务配置
          MAX_CATEGORIES: !Ref MaxCategoriesPerRun
          MAX_BRANDS: !Ref MaxBrandsPerCategory
          MAX_MODELS: !Ref MaxModelsPerBrand
          
          # Token 和超时控制
          MAX_TOTAL_TOKENS: !Ref MaxTotalTokens
          LAMBDA_TIMEOUT_SECONDS: "900"
          LAMBDA_TIMEOUT_BUFFER: !Ref LambdaTimeoutBuffer
          
          # API 调用参数
          DOUBAO_TEMPERATURE: "0.7"
          DOUBAO_MAX_TOKENS: "4000"
          DOUBAO_TOP_P: "1.0"
          DOUBAO_REQUEST_TIMEOUT: "90"
          DOUBAO_MAX_RETRIES: "3"
          
          # 系统提示词
          DOUBAO_SYSTEM_PROMPT: "You are a helpful assistant that returns data in JSON format."
          
          # 处理流程控制
          CATEGORY_LIMIT: !Ref CategoryLimit
          BRAND_LIMIT: !Ref BrandLimit
          API_CALL_DELAY: !Ref ApiCallDelay
          
          # 数据来源标识
          DATA_SOURCE: "AI_DISCOVERY"
      Tags:
        - Key: Application
          Value: ProductCatalog
        - Key: Environment
          Value: !Ref Environment

Outputs:
  # ============ S3 输出 ============
  LambdaCodeBucketName:
    Description: S3 存储 Lambda 代码的存储桶名称
    Condition: DeployMainAppCondition
    Value: !Ref LambdaCodeS3Bucket
    Export:
      Name: !Sub "${AWS::StackName}-CodeBucket"

  LambdaCodeObjectKey:
    Description: S3 中 Lambda 代码对象键
    Condition: DeployMainAppCondition
    Value: !Ref LambdaCodeS3Key
    Export:
      Name: !Sub "${AWS::StackName}-CodeKey"

  # ============ Secret 输出 ============
  DeepSeekApiSecretArn:
    Description: DeepSeek API Secret ARN
    Condition: DeploySecretCondition
    Value: !Ref DeepSeekApiSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  DeepSeekApiSecretName:
    Description: DeepSeek API Secret 名称
    Condition: DeploySecretCondition
    Value: !Sub "${SecretName}/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-SecretName"

  # ============ 主应用输出 ============
  ProductCatalogTableName:
    Description: DynamoDB 产品目录表名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  ProductCatalogTableArn:
    Description: DynamoDB 产品目录表 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  DiscoveryLambdaName:
    Description: Lambda 发现函数名称
    Condition: DeployMainAppCondition
    Value: !Ref ProductCatalogDiscovery
    Export:
      Name: !Sub "${AWS::StackName}-LambdaName"

  DiscoveryLambdaArn:
    Description: Lambda 发现函数 ARN
    Condition: DeployMainAppCondition
    Value: !GetAtt ProductCatalogDiscovery.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

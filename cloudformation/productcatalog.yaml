AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Product Catalog Demo Stack

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

Resources:

  ProductCatalogTable:
    Type: AWS::DynamoDB::Table

    Properties:
      TableName: !Sub "ProductCatalog-${Environment}"

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S

        - AttributeName: SK
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH

        - AttributeName: SK
          KeyType: RANGE

      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Application
          Value: ProductCatalog

        - Key: Environment
          Value: !Ref Environment

  LambdaExecutionRole:
    Type: AWS::IAM::Role

    Properties:
      RoleName: !Sub "ProductCatalog-LambdaRole-${Environment}"

      AssumeRolePolicyDocument:
        Version: "2012-10-17"

        Statement:
          - Effect: Allow

            Principal:
              Service:
                - lambda.amazonaws.com

            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: DynamoDBAccess

          PolicyDocument:
            Version: "2012-10-17"

            Statement:

              - Effect: Allow

                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan

                Resource: !GetAtt ProductCatalogTable.Arn

              - Effect: Allow

                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents

                Resource: "*"

  TestLambda:
    Type: AWS::Lambda::Function

    Properties:
      FunctionName: !Sub "ProductCatalog-Test-${Environment}"

      Runtime: python3.12

      Handler: index.lambda_handler

      Timeout: 10

      Role: !GetAtt LambdaExecutionRole.Arn

      Environment:
        Variables:
          TABLE_NAME: !Ref ProductCatalogTable

      Code:
        ZipFile: |
          import os
          import boto3

          dynamodb = boto3.resource("dynamodb")

          def lambda_handler(event, context):

              table = dynamodb.Table(
                  os.environ["TABLE_NAME"]
              )

              table.put_item(
                  Item={
                      "PK": "TEST#001",
                      "SK": "METADATA",
                      "name": "Lambda Test"
                  }
              )

              return {
                  "statusCode": 200,
                  "message": "Success"
              }

Outputs:

  ProductCatalogTableName:
    Description: DynamoDB Table Name
    Value: !Ref ProductCatalogTable

  ProductCatalogTableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt ProductCatalogTable.Arn

  LambdaName:
    Description: Lambda Function Name
    Value: !Ref TestLambda

  LambdaRoleArn:
    Description: Lambda Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

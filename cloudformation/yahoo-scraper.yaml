AWSTemplateFormatVersion: "2010-09-09"

Description: Yahoo Auction Scraper Lambda Function

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test, prod]
    Description: Environment name

  LambdaCodeS3Bucket:
    Type: String
    Default: productcatalog-lambda-code-767076981380
    Description: S3 bucket for Lambda code

  LambdaCodeS3Key:
    Type: String
    Default: yahoo-scraper/lambda.zip
    Description: S3 key for Lambda code

  SearchKeyword:
    Type: String
    Default: スズキバイオリン540
    Description: Default search keyword

  ItemsPerPage:
    Type: String
    Default: "50"
    AllowedValues: ["20", "50", "100"]

  ScheduleRate:
    Type: String
    Default: "rate(6 hours)"
    Description: Schedule expression

  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 900

  LogRetentionDays:
    Type: Number
    Default: 30

Resources:
  # DynamoDB Table
  AuctionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub YahooAuctionItems-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auction_id
          AttributeType: S
        - AttributeName: keyword
          AttributeType: S
        - AttributeName: scraped_at
          AttributeType: S
      KeySchema:
        - AttributeName: auction_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: keyword-index
          KeySchema:
            - AttributeName: keyword
              KeyType: HASH
            - AttributeName: scraped_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Lambda Execution Role
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource: !GetAtt AuctionTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub ${AuctionTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/YahooScraper-${Environment}:*

  # Lambda Function
  ScraperFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaRole
    Properties:
      FunctionName: !Sub YahooScraper-${Environment}
      Runtime: python3.12
      Architecture: arm64
      Handler: yahoo_scraper.lambda_handler
      Timeout: !Ref LambdaTimeout
      MemorySize: 512
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref AuctionTable
          SEARCH_KEYWORD: !Ref SearchKeyword
          BASE_URL: https://auctions.yahoo.co.jp/closedsearch/closedsearch
          PAGE: "1"
          ITEMS_PER_PAGE: !Ref ItemsPerPage
          SELECT: "6"
          MODE: "3"
          DEST_PREF_CODE: "23"
          USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
          REQUEST_TIMEOUT: "30"
          MAX_RETRIES: "3"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: YahooScraper

  # EventBridge Schedule
  ScheduledRule:
    Type: AWS::Events::Rule
    Properties:
      Description: !Sub Trigger Yahoo Scraper every ${ScheduleRate}
      ScheduleExpression: !Ref ScheduleRate
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScraperFunction.Arn
          Id: YahooScraperTarget
          Input: !Sub |
            {
              "keyword": "${SearchKeyword}",
              "max_pages": 1
            }

  # Schedule Permission
  SchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScraperFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledRule.Arn

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref ScraperFunction
    Export:
      Name: !Sub ${AWS::StackName}-FunctionName

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ScraperFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-FunctionArn

  TableName:
    Description: DynamoDB table name
    Value: !Ref AuctionTable
    Export:
      Name: !Sub ${AWS::StackName}-TableName

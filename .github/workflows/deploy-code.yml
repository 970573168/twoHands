name: Deploy Lambda Code

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      s3_bucket:
        description: 'Lambda代码的S3存储桶'
        required: true
        type: string
        default: 'productcatalog-lambda-code-767076981380'
      
      update_auction:
        description: '更新 Yahoo Auction Scraper'
        required: true
        default: true
        type: boolean
      
      update_analyzer:
        description: '更新 Yahoo Auction Analyzer'
        required: true
        default: true
        type: boolean
      
      update_catalog:
        description: '更新 ProductCatalog Discovery'
        required: true
        default: false
        type: boolean
      
      update_model_analyzer:
        description: '更新 Model Analyzer（型号批量分析器）'
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy-code:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 计算代码哈希
        id: hash
        run: |
          # 计算所有 Lambda 源代码的哈希值
          echo "📊 计算源代码哈希..."
          
          # Auction Scraper 哈希
          if [ -f "src/yahoo_auction_scraper.py" ]; then
            AUCTION_HASH=$(sha256sum src/yahoo_auction_scraper.py | cut -d' ' -f1)
          else
            AUCTION_HASH="file_not_found"
          fi
          echo "auction_hash=$AUCTION_HASH" >> $GITHUB_OUTPUT
          echo "  Auction Scraper: $AUCTION_HASH"
          
          # Analyzer 哈希
          if [ -f "src/auction_analyzer.py" ]; then
            ANALYZER_HASH=$(sha256sum src/auction_analyzer.py | cut -d' ' -f1)
          else
            ANALYZER_HASH="file_not_found"
          fi
          echo "analyzer_hash=$ANALYZER_HASH" >> $GITHUB_OUTPUT
          echo "  Analyzer: $ANALYZER_HASH"
          
          # Catalog Discovery 哈希
          if [ -f "src/product_catalog_discovery.py" ]; then
            CATALOG_HASH=$(sha256sum src/product_catalog_discovery.py | cut -d' ' -f1)
          else
            CATALOG_HASH="file_not_found"
          fi
          echo "catalog_hash=$CATALOG_HASH" >> $GITHUB_OUTPUT
          echo "  Catalog Discovery: $CATALOG_HASH"
          
          # Model Analyzer 哈希
          if [ -f "src/model_analyzer.py" ]; then
            MODEL_ANALYZER_HASH=$(sha256sum src/model_analyzer.py | cut -d' ' -f1)
          else
            MODEL_ANALYZER_HASH="file_not_found"
          fi
          echo "model_analyzer_hash=$MODEL_ANALYZER_HASH" >> $GITHUB_OUTPUT
          echo "  Model Analyzer: $MODEL_ANALYZER_HASH"
          
          # 总体哈希（用于 S3 文件命名）
          SOURCE_HASH=""
          for f in src/*.py; do
            if [ -f "$f" ]; then
              SOURCE_HASH="${SOURCE_HASH}$(sha256sum "$f" | cut -d' ' -f1)"
            fi
          done
          SOURCE_HASH=$(echo "$SOURCE_HASH" | sha256sum | cut -d' ' -f1)
          echo "source_hash=$SOURCE_HASH" >> $GITHUB_OUTPUT
          echo "  Overall: $SOURCE_HASH"

      - name: 检查是否需要构建
        id: check
        run: |
          NEED_BUILD="false"
          BUILD_REASONS=""
          
          # 检查是否需要更新 auction
          if [[ "${{ github.event.inputs.update_auction }}" == "true" ]]; then
            echo "✅ 需要更新 Yahoo Auction Scraper"
            NEED_BUILD="true"
            BUILD_REASONS="${BUILD_REASONS} AuctionScraper"
          fi
          
          # 检查是否需要更新 analyzer
          if [[ "${{ github.event.inputs.update_analyzer }}" == "true" ]]; then
            echo "✅ 需要更新 Yahoo Auction Analyzer"
            NEED_BUILD="true"
            BUILD_REASONS="${BUILD_REASONS} Analyzer"
          fi
          
          # 检查是否需要更新 catalog
          if [[ "${{ github.event.inputs.update_catalog }}" == "true" ]]; then
            echo "✅ 需要更新 ProductCatalog Discovery"
            NEED_BUILD="true"
            BUILD_REASONS="${BUILD_REASONS} Catalog"
          fi
          
          # 检查是否需要更新 model_analyzer
          if [[ "${{ github.event.inputs.update_model_analyzer }}" == "true" ]]; then
            echo "✅ 需要更新 Model Analyzer"
            NEED_BUILD="true"
            BUILD_REASONS="${BUILD_REASONS} ModelAnalyzer"
          fi
          
          if [[ "$NEED_BUILD" == "false" ]]; then
            echo "⚠️ 没有选择任何要更新的函数，跳过构建"
          else
            echo "🔨 构建原因:${BUILD_REASONS}"
          fi
          
          echo "need_build=$NEED_BUILD" >> $GITHUB_OUTPUT

      - name: 构建 Lambda 包
        if: steps.check.outputs.need_build == 'true'
        run: |
          echo "🔨 正在构建 Lambda 包..."
          
          # 创建临时构建目录
          BUILD_DIR=$(mktemp -d)
          echo "构建目录: $BUILD_DIR"
          
          # 复制所有 Lambda 源代码
          if [[ "${{ github.event.inputs.update_auction }}" == "true" ]] && [ -f "src/yahoo_auction_scraper.py" ]; then
            cp src/yahoo_auction_scraper.py "$BUILD_DIR/"
            echo "✅ 已复制 yahoo_auction_scraper.py"
          fi
          
          if [[ "${{ github.event.inputs.update_analyzer }}" == "true" ]] && [ -f "src/auction_analyzer.py" ]; then
            cp src/auction_analyzer.py "$BUILD_DIR/"
            echo "✅ 已复制 auction_analyzer.py"
          fi
          
          if [[ "${{ github.event.inputs.update_catalog }}" == "true" ]] && [ -f "src/product_catalog_discovery.py" ]; then
            cp src/product_catalog_discovery.py "$BUILD_DIR/"
            echo "✅ 已复制 product_catalog_discovery.py"
          fi
          
          if [[ "${{ github.event.inputs.update_model_analyzer }}" == "true" ]] && [ -f "src/model_analyzer.py" ]; then
            cp src/model_analyzer.py "$BUILD_DIR/"
            echo "✅ 已复制 model_analyzer.py"
          fi
          
          # 复制依赖（如果存在 requirements.txt）
          if [ -f "requirements.txt" ]; then
            echo "📦 安装 Python 依赖..."
            pip install -r requirements.txt -t "$BUILD_DIR" --no-cache-dir
          fi
          
          # 列出构建内容
          echo "📋 构建内容："
          ls -la "$BUILD_DIR/"
          
          # 打包
          cd "$BUILD_DIR"
          zip -r "$GITHUB_WORKSPACE/lambda.zip" .
          cd "$GITHUB_WORKSPACE"
          
          echo "✅ Lambda 包构建完成"
          echo "包大小: $(du -h lambda.zip | cut -f1)"

      - name: 配置 AWS 凭证
        if: steps.check.outputs.need_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: 上传到 S3
        if: steps.check.outputs.need_build == 'true'
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          HASH_SHORT="${{ steps.hash.outputs.source_hash }}"
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="productcatalog/lambda-${TIMESTAMP}-${HASH_SHORT:0:8}.zip"
          
          echo "📤 正在上传 Lambda 代码到 S3..."
          echo "存储桶: $S3_BUCKET"
          echo "路径: $S3_KEY"
          
          # 上传
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          # 验证上传
          if aws s3 ls "s3://$S3_BUCKET/$S3_KEY" > /dev/null 2>&1; then
            echo "✅ 上传成功"
          else
            echo "❌ 上传失败"
            exit 1
          fi
          
          echo "s3_key=$S3_KEY" >> $GITHUB_ENV
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_ENV

      - name: 更新 Yahoo Auction Scraper 函数
        if: steps.check.outputs.need_build == 'true' && github.event.inputs.update_auction == 'true'
        run: |
          FUNCTION_NAME="YahooAuctionScraper-${{ github.event.inputs.environment }}"
          echo "🔄 正在检查 $FUNCTION_NAME..."
          
          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            CURRENT_HASH=$(aws lambda get-function --function-name "$FUNCTION_NAME" --query 'Configuration.Description' --output text 2>/dev/null || echo "")
            
            if [[ "$CURRENT_HASH" == "${{ steps.hash.outputs.auction_hash }}" ]]; then
              echo "✅ 代码未变更，跳过更新"
            else
              echo "🔄 更新函数代码..."
              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --s3-bucket "${{ env.s3_bucket }}" \
                --s3-key "${{ env.s3_key }}"
              
              echo "⏳ 等待函数更新完成..."
              aws lambda wait function-updated --function-name "$FUNCTION_NAME"
              
              # 更新函数描述为新的哈希值
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --description "${{ steps.hash.outputs.auction_hash }}"
              
              echo "✅ YahooAuctionScraper 更新完成"
            fi
          else
            echo "⚠️ 函数不存在，跳过更新"
          fi

      - name: 更新 Yahoo Auction Analyzer 函数
        if: steps.check.outputs.need_build == 'true' && github.event.inputs.update_analyzer == 'true'
        run: |
          FUNCTION_NAME="YahooAuctionAnalyzer-${{ github.event.inputs.environment }}"
          echo "🔄 正在检查 $FUNCTION_NAME..."
          
          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            CURRENT_HASH=$(aws lambda get-function --function-name "$FUNCTION_NAME" --query 'Configuration.Description' --output text 2>/dev/null || echo "")
            
            if [[ "$CURRENT_HASH" == "${{ steps.hash.outputs.analyzer_hash }}" ]]; then
              echo "✅ 代码未变更，跳过更新"
            else
              echo "🔄 更新函数代码..."
              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --s3-bucket "${{ env.s3_bucket }}" \
                --s3-key "${{ env.s3_key }}"
              
              echo "⏳ 等待函数更新完成..."
              aws lambda wait function-updated --function-name "$FUNCTION_NAME"
              
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --description "${{ steps.hash.outputs.analyzer_hash }}"
              
              echo "✅ YahooAuctionAnalyzer 更新完成"
            fi
          else
            echo "⚠️ 函数不存在，跳过更新"
          fi

      - name: 更新 ProductCatalog Discovery 函数
        if: steps.check.outputs.need_build == 'true' && github.event.inputs.update_catalog == 'true'
        run: |
          FUNCTION_NAME="ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          echo "🔄 正在检查 $FUNCTION_NAME..."
          
          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            CURRENT_HASH=$(aws lambda get-function --function-name "$FUNCTION_NAME" --query 'Configuration.Description' --output text 2>/dev/null || echo "")
            
            if [[ "$CURRENT_HASH" == "${{ steps.hash.outputs.catalog_hash }}" ]]; then
              echo "✅ 代码未变更，跳过更新"
            else
              echo "🔄 更新函数代码..."
              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --s3-bucket "${{ env.s3_bucket }}" \
                --s3-key "${{ env.s3_key }}"
              
              echo "⏳ 等待函数更新完成..."
              aws lambda wait function-updated --function-name "$FUNCTION_NAME"
              
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --description "${{ steps.hash.outputs.catalog_hash }}"
              
              echo "✅ ProductCatalog-Discovery 更新完成"
            fi
          else
            echo "⚠️ 函数不存在，跳过更新"
          fi

      - name: 更新 Model Analyzer 函数
        if: steps.check.outputs.need_build == 'true' && github.event.inputs.update_model_analyzer == 'true'
        run: |
          FUNCTION_NAME="ModelAnalyzer-${{ github.event.inputs.environment }}"
          echo "🔄 正在检查 $FUNCTION_NAME..."
          
          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            CURRENT_HASH=$(aws lambda get-function --function-name "$FUNCTION_NAME" --query 'Configuration.Description' --output text 2>/dev/null || echo "")
            
            if [[ "$CURRENT_HASH" == "${{ steps.hash.outputs.model_analyzer_hash }}" ]]; then
              echo "✅ 代码未变更，跳过更新"
            else
              echo "🔄 更新函数代码..."
              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --s3-bucket "${{ env.s3_bucket }}" \
                --s3-key "${{ env.s3_key }}"
              
              echo "⏳ 等待函数更新完成..."
              aws lambda wait function-updated --function-name "$FUNCTION_NAME"
              
              aws lambda update-function-configuration \
                --function-name "$FUNCTION_NAME" \
                --description "${{ steps.hash.outputs.model_analyzer_hash }}"
              
              echo "✅ ModelAnalyzer 更新完成"
            fi
          else
            echo "⚠️ 函数不存在，跳过更新"
          fi

      - name: 显示部署信息
        if: success()
        run: |
          echo "=========================================="
          echo "✅ 部署成功完成！"
          echo ""
          if [[ "${{ steps.check.outputs.need_build }}" == "true" ]]; then
            echo "📦 包路径: s3://${{ env.s3_bucket }}/${{ env.s3_key }}"
            echo "🔑 代码哈希:"
            echo "   Auction Scraper: ${{ steps.hash.outputs.auction_hash }}"
            echo "   Analyzer: ${{ steps.hash.outputs.analyzer_hash }}"
            echo "   Catalog: ${{ steps.hash.outputs.catalog_hash }}"
            echo "   Model Analyzer: ${{ steps.hash.outputs.model_analyzer_hash }}"
            echo "   Overall: ${{ steps.hash.outputs.source_hash }}"
          fi
          echo ""
          echo "⚡ 函数更新状态:"
          if [[ "${{ github.event.inputs.update_auction }}" == "true" ]]; then
            echo "   ✅ YahooAuctionScraper-${{ github.event.inputs.environment }}"
          else
            echo "   ⏭️  YahooAuctionScraper-${{ github.event.inputs.environment }} (跳过)"
          fi
          if [[ "${{ github.event.inputs.update_analyzer }}" == "true" ]]; then
            echo "   ✅ YahooAuctionAnalyzer-${{ github.event.inputs.environment }}"
          else
            echo "   ⏭️  YahooAuctionAnalyzer-${{ github.event.inputs.environment }} (跳过)"
          fi
          if [[ "${{ github.event.inputs.update_catalog }}" == "true" ]]; then
            echo "   ✅ ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          else
            echo "   ⏭️  ProductCatalog-Discovery-${{ github.event.inputs.environment }} (跳过)"
          fi
          if [[ "${{ github.event.inputs.update_model_analyzer }}" == "true" ]]; then
            echo "   ✅ ModelAnalyzer-${{ github.event.inputs.environment }}"
          else
            echo "   ⏭️  ModelAnalyzer-${{ github.event.inputs.environment }} (跳过)"
          fi
          echo "=========================================="

      - name: 部署失败通知
        if: failure()
        run: |
          echo "=========================================="
          echo "❌ 部署失败！"
          echo "环境: ${{ github.event.inputs.environment }}"
          echo "时间: $(date)"
          echo "请检查日志获取详细错误信息"
          echo "=========================================="

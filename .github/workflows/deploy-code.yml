name: Deploy Lambda Code

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      s3_bucket:
        description: 'S3 bucket for Lambda code'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-code:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Lambda Package
        run: |
          echo "🔨 Building Lambda package..."
          chmod +x build.sh
          ./build.sh

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Upload to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          
          echo "📤 Uploading Lambda code to S3..."
          echo "Bucket: $S3_BUCKET"
          echo "Key: $S3_KEY"
          
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          echo "s3_key=$S3_KEY" >> $GITHUB_ENV

      - name: Update Lambda Function
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          FUNCTION_NAME="ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="${{ env.s3_key }}"
          
          echo "🔄 Updating Lambda function code..."
          echo "Function: $FUNCTION_NAME"
          echo "S3: s3://$S3_BUCKET/$S3_KEY"
          
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "$S3_BUCKET" \
            --s3-key "$S3_KEY"
          
          echo "✅ Lambda function updated successfully"
          
          # 等待 Lambda 更新完成
          echo "⏳ Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          
          echo "✅ Lambda update confirmed"

      - name: Update CloudFormation Stack
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="${{ env.s3_key }}"
          
          echo "🔄 Updating CloudFormation stack with new S3 key..."
          
          aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --use-previous-template \
            --parameters \
              ParameterKey=Environment,UsePreviousValue=true \
              ParameterKey=DeploySecret,UsePreviousValue=true \
              ParameterKey=DeployMainApp,UsePreviousValue=true \
              ParameterKey=DeepSeekModel,UsePreviousValue=true \
              ParameterKey=DeepSeekApiUrl,UsePreviousValue=true \
              ParameterKey=MaxCategoriesPerRun,UsePreviousValue=true \
              ParameterKey=MaxBrandsPerCategory,UsePreviousValue=true \
              ParameterKey=MaxModelsPerBrand,UsePreviousValue=true \
              ParameterKey=LogRetentionDays,UsePreviousValue=true \
              ParameterKey=LambdaCodeS3Bucket,ParameterValue=$S3_BUCKET \
              ParameterKey=LambdaCodeS3Key,ParameterValue=$S3_KEY \
            --capabilities CAPABILITY_NAMED_IAM
          
          echo "⏳ Waiting for stack update to complete..."
          aws cloudformation wait stack-update-complete \
            --stack-name "$STACK_NAME"
          
          echo "✅ Stack update completed"

      - name: Show Deployment Info
        if: success()
        run: |
          echo "=========================================="
          echo "✅ Deployment completed successfully!"
          echo "📦 Package: s3://${{ github.event.inputs.s3_bucket }}/${{ env.s3_key }}"
          echo "⚡ Function: ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          echo "🏗️ Stack: productcatalog-app-${{ github.event.inputs.environment }}"
          echo "=========================================="

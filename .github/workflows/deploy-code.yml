name: Deploy Lambda Code

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      s3_bucket:
        description: 'S3 bucket for Lambda code'
        required: true
        type: string
        default: 'productcatalog-lambda-code-767076981380'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-code:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Lambda Package
        run: |
          echo "🔨 Building Lambda package..."
          chmod +x build.sh
          ./build.sh

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Upload to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          
          echo "📤 Uploading Lambda code to S3..."
          echo "Bucket: $S3_BUCKET"
          echo "Key: $S3_KEY"
          
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          echo "s3_key=$S3_KEY" >> $GITHUB_ENV

      - name: Update ProductCatalog Discovery Function
        run: |
          FUNCTION_NAME="ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="${{ env.s3_key }}"
          
          echo "🔄 Updating ProductCatalog Lambda function..."
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "$S3_BUCKET" \
            --s3-key "$S3_KEY"
          
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"

      - name: Update Yahoo Auction Scraper Function
        run: |
          FUNCTION_NAME="YahooAuctionScraper-${{ github.event.inputs.environment }}"
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          S3_KEY="${{ env.s3_key }}"
          
          echo "🔄 Updating YahooAuctionScraper Lambda function..."
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "$S3_BUCKET" \
            --s3-key "$S3_KEY" || echo "⚠️ Function may not exist yet; skipping update."
          
          # 若函数存在则等待更新完成
          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          fi

      - name: Show Deployment Info
        if: success()
        run: |
          echo "=========================================="
          echo "✅ Deployment completed successfully!"
          echo "📦 Package: s3://${{ github.event.inputs.s3_bucket }}/${{ env.s3_key }}"
          echo "⚡ Functions:"
          echo "   - ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          echo "   - YahooAuctionScraper-${{ github.event.inputs.environment }}"
          echo "=========================================="

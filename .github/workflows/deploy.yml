name: Deploy Product Catalog

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      # ========== 部署选择 ==========
      deploy_secret:
        description: 'Deploy DeepSeek Secret?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      
      deploy_main_app:
        description: 'Deploy Main Application?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      
      # ========== Secret 参数 ==========
      api_key:
        description: 'DeepSeek API Key (sk-xxx) - required if deploy_secret=true'
        required: false
        type: string
      
      # ========== 主应用参数 ==========
      schedule_state:
        description: 'Schedule state'
        required: true
        default: 'DISABLED'
        type: choice
        options:
          - ENABLED
          - DISABLED
      
      max_categories:
        description: 'Max categories'
        required: false
        default: '20'
        type: string
      
      max_brands:
        description: 'Max brands per category'
        required: false
        default: '20'
        type: string
      
      max_models:
        description: 'Max models per brand'
        required: false
        default: '50'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Validate Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/productcatalog.yaml
      - name: Deploy Stack
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "=========================================="
          echo "Deploying stack: $STACK_NAME"
          echo "Deploy Secret: ${{ github.event.inputs.deploy_secret }}"
          echo "Deploy Main App: ${{ github.event.inputs.deploy_main_app }}"
          echo "=========================================="
          # 构建参数
          PARAMS="Environment=${{ github.event.inputs.environment }} \
            DeploySecret=${{ github.event.inputs.deploy_secret }} \
            DeployMainApp=${{ github.event.inputs.deploy_main_app }} \
            ScheduleState=${{ github.event.inputs.schedule_state }} \
            MaxCategoriesPerRun=${{ github.event.inputs.max_categories }} \
            MaxBrandsPerCategory=${{ github.event.inputs.max_brands }} \
            MaxModelsPerBrand=${{ github.event.inputs.max_models }}"
          # 如果部署 Secret，添加 API Key
          if [ "${{ github.event.inputs.deploy_secret }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.api_key }}" ]; then
              PARAMS="$PARAMS DeepSeekApiKey=${{ github.event.inputs.api_key }}"
              echo "✅ API Key provided"
            else
              echo "⚠️ WARNING: deploy_secret=true but no API key provided"
              echo "   Secret will be created with placeholder value"
            fi
          fi
          # 如果只部署主应用（不部署新 Secret），尝试获取已有 Secret ARN
          if [ "${{ github.event.inputs.deploy_secret }}" = "false" ] && [ "${{ github.event.inputs.deploy_main_app }}" = "true" ]; then
            # 尝试从已有栈获取 Secret ARN
            SECRET_STACK="productcatalog-secret-${{ github.event.inputs.environment }}"
            if aws cloudformation describe-stacks --stack-name "$SECRET_STACK" &>/dev/null; then
              SECRET_ARN=$(aws cloudformation describe-stacks \
                --stack-name "$SECRET_STACK" \
                --query "Stacks[0].Outputs[?OutputKey=='DeepSeekApiSecretArn'].OutputValue" \
                --output text 2>/dev/null || echo "")
              
              if [ -n "$SECRET_ARN" ]; then
                PARAMS="$PARAMS DeepSeekSecretArn=$SECRET_ARN"
                echo "✅ Found existing Secret ARN: $SECRET_ARN"
              fi
            else
              # 尝试通过名称查找
              SECRET_NAME="ProductCatalog/DeepSeekApiKey/${{ github.event.inputs.environment }}"
              if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" &>/dev/null; then
                echo "✅ Found existing secret by name: $SECRET_NAME"
                # 不传 ARN，让模板通过名称查找
              else
                echo "⚠️ WARNING: No existing secret found!"
                echo "   Please deploy secret first or set deploy_secret=true"
              fi
            fi
          fi
          echo ""
          echo "📋 Parameters:"
          echo "$PARAMS" | tr ' ' '\n'
          echo ""
          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides $PARAMS \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
      - name: Show Stack Outputs
        if: success()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "===== STACK OUTPUTS ====="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
      - name: Show Failed Resources
        if: failure()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "===== FAILED EVENTS ====="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason]" \
            --output table

name: Deploy Product Catalog - Small Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Context
        run: |
          echo "Repository=$GITHUB_REPOSITORY"
          echo "Ref=$GITHUB_REF"
          echo "Actor=$GITHUB_ACTOR"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Validate CloudFormation Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/productcatalog.yaml

      - name: Deploy CloudFormation - Small Test
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name productcatalog-app-dev \
            --parameter-overrides \
              Environment=dev \
              ScheduleState=DISABLED \
              LambdaReservedConcurrency=2 \
              WorkerMaximumConcurrency=2 \
              MaxCategoriesPerRun=1 \
              MaxBrandsPerCategory=1 \
              MaxModelsPerBrand=3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show Stack Outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name productcatalog-app-dev \
            --query 'Stacks[0].Outputs' \
            --output table

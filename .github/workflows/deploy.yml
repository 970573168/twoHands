name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

      deploy_secret:
        description: "Deploy API Secret?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      deploy_main_app:
        description: "Deploy Main Application?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      deploy_scraper:
        description: "Deploy Yahoo Auction Scraper?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      api_key:
        description: "API Key (required if deploy_secret=true)"
        required: false
        type: string

      s3_bucket:
        description: "S3 bucket name for Lambda code"
        required: true
        default: "productcatalog-lambda-code"
        type: string

      stack_params:
        description: "CloudFormation params to override defaults (JSON format)"
        required: false
        default: "{}"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          echo "AWS_REGION=ap-northeast-1" >> "$GITHUB_ENV"

      - name: Prepare S3 Bucket Name
        run: |
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}-${AWS_ACCOUNT_ID}"
          echo "S3_BUCKET=$S3_BUCKET" >> "$GITHUB_ENV"

      - name: Create S3 Bucket if not exists
        if: ${{ github.event.inputs.deploy_main_app == 'true' || github.event.inputs.deploy_scraper == 'true' }}
        run: |
          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "Bucket exists: $S3_BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$S3_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi
          aws s3api put-bucket-versioning --bucket "$S3_BUCKET" --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "$S3_BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-public-access-block --bucket "$S3_BUCKET" --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Build and Upload Lambda Code
        if: ${{ github.event.inputs.deploy_main_app == 'true' || github.event.inputs.deploy_scraper == 'true' }}
        run: |
          BUILD_DIR="build"
          rm -rf "$BUILD_DIR" lambda.zip
          mkdir -p "$BUILD_DIR"
          
          pip3 install requests beautifulsoup4 boto3 -t "$BUILD_DIR" \
            --platform manylinux2014_aarch64 --only-binary=:all: --python-version 3.12 --quiet
          
          if [ -f requirements.txt ]; then
            pip3 install -r requirements.txt -t "$BUILD_DIR" \
              --platform manylinux2014_aarch64 --only-binary=:all: --python-version 3.12 --quiet
          fi
          
          for d in src lambda; do
            if [ -d "$d" ] && [ -n "$(ls -A $d/*.py 2>/dev/null)" ]; then
              cp $d/*.py "$BUILD_DIR/" && break
            fi
          done
          
          cd "$BUILD_DIR" && zip -r9 ../lambda.zip . -q && cd ..
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_KEY="productcatalog/lambda-${TIMESTAMP}.zip"
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          echo "S3_KEY=$S3_KEY" >> "$GITHUB_ENV"

      - name: Deploy Stack
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          PARAMS=(
            "Environment=${{ github.event.inputs.environment }}"
            "DeploySecret=${{ github.event.inputs.deploy_secret }}"
            "DeployMainApp=${{ github.event.inputs.deploy_main_app }}"
            "DeployScraper=${{ github.event.inputs.deploy_scraper }}"
            "DeployModelAnalyzer=true"
            "LambdaCodeS3Bucket=$S3_BUCKET"
            "LambdaCodeS3Key=${S3_KEY:-productcatalog/lambda.zip}"
          )
          
          [ "${{ github.event.inputs.deploy_secret }}" = "true" ] && [ -n "${{ github.event.inputs.api_key }}" ] && \
            PARAMS+=("ApiKey=${{ github.event.inputs.api_key }}")
          
          EXTRA_PARAMS='${{ github.event.inputs.stack_params }}'
          if [ "$EXTRA_PARAMS" != "{}" ] && [ -n "$EXTRA_PARAMS" ]; then
            while IFS="=" read -r k v; do
              [ -n "$k" ] && PARAMS+=("$k=$v")
            done < <(echo "$EXTRA_PARAMS" | jq -r 'to_entries[] | "\(.key)=\(.value)"')
          fi
          
          echo "Deploying with params:"
          printf '%s\n' "${PARAMS[@]}"
          
          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides "${PARAMS[@]}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show Stack Outputs
        if: success()
        run: |
          aws cloudformation describe-stacks \
            --stack-name "productcatalog-app-${{ github.event.inputs.environment }}" \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table

      - name: Show Failed Resources
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name "productcatalog-app-${{ github.event.inputs.environment }}" \
            --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason,Timestamp]" \
            --output table

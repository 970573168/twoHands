name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      deploy_secret:
        description: 'Deploy DeepSeek Secret?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      
      deploy_main_app:
        description: 'Deploy Main Application?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      
      api_key:
        description: 'DeepSeek API Key (required if deploy_secret=true)'
        required: false
        type: string
      
      s3_bucket:
        description: 'S3 bucket for Lambda code'
        required: true
        default: 'productcatalog-lambda-code'
        type: string
      
      max_categories:
        description: 'Max categories per run'
        required: false
        default: '20'
        type: string
      
      max_brands:
        description: 'Max brands per category'
        required: false
        default: '20'
        type: string
      
      max_models:
        description: 'Max models per brand'
        required: false
        default: '50'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Create S3 Bucket if not exists
        if: ${{ github.event.inputs.deploy_main_app == 'true' }}
        run: |
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          
          echo "🔍 Checking if S3 bucket exists: $S3_BUCKET"
          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "✅ S3 bucket already exists: $S3_BUCKET"
          else
            echo "📦 Creating S3 bucket: $S3_BUCKET"
            
            # 获取 AWS 账号 ID
            AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            
            # 如果 bucket 名称不包含账号 ID，添加后缀使其唯一
            if [[ ! "$S3_BUCKET" =~ $AWS_ACCOUNT_ID ]]; then
              S3_BUCKET="${S3_BUCKET}-${AWS_ACCOUNT_ID}"
              echo "📝 Appending account ID to bucket name: $S3_BUCKET"
              echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
            fi
            
            aws s3api create-bucket \
              --bucket "$S3_BUCKET" \
              --region ap-northeast-1 \
              --create-bucket-configuration LocationConstraint=ap-northeast-1
            
            echo "🔒 Enabling versioning..."
            aws s3api put-bucket-versioning \
              --bucket "$S3_BUCKET" \
              --versioning-configuration Status=Enabled
            
            echo "🔐 Enabling encryption..."
            aws s3api put-bucket-encryption \
              --bucket "$S3_BUCKET" \
              --server-side-encryption-configuration '{
                "Rules": [
                  {
                    "ApplyServerSideEncryptionByDefault": {
                      "SSEAlgorithm": "AES256"
                    }
                  }
                ]
              }'
            
            echo "🚫 Blocking public access..."
            aws s3api put-public-access-block \
              --bucket "$S3_BUCKET" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            
            echo "✅ S3 bucket created successfully: $S3_BUCKET"
          fi
          
          # 确保环境变量设置正确
          if [ -z "${{ env.S3_BUCKET }}" ]; then
            echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          fi

      - name: Upload Placeholder Lambda Code
        if: ${{ github.event.inputs.deploy_main_app == 'true' }}
        run: |
          S3_BUCKET="${{ env.S3_BUCKET }}"
          if [ -z "$S3_BUCKET" ]; then
            S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          fi
          
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          
          echo "📤 Uploading placeholder Lambda code to S3..."
          echo "Bucket: $S3_BUCKET"
          echo "Key: $S3_KEY"
          
          # 创建一个最小的占位 ZIP 文件
          mkdir -p /tmp/lambda_placeholder
          cat > /tmp/lambda_placeholder/lambda_function.py << 'PLACEHOLDER_EOF'
import json

def lambda_handler(event, context):
    return {
        'statusCode': 200,
        'body': json.dumps({'message': 'Placeholder - update with real code'})
    }
PLACEHOLDER_EOF
          
          cd /tmp/lambda_placeholder
          zip -r9 /tmp/lambda.zip . -q
          cd -
          
          aws s3 cp /tmp/lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          echo "✅ Placeholder code uploaded"
          
          # 保存 S3 信息到环境变量
          echo "S3_KEY=$S3_KEY" >> $GITHUB_ENV
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV

      - name: Validate Template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/productcatalog.yaml

      - name: Deploy Stack
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          
          # 使用已创建的 S3 bucket
          S3_BUCKET="${{ env.S3_BUCKET }}"
          S3_KEY="${{ env.S3_KEY }}"
          
          if [ -z "$S3_BUCKET" ]; then
            S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          fi
          if [ -z "$S3_KEY" ]; then
            S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          fi
          
          # 设置默认值
          MAX_CATEGORIES="${{ github.event.inputs.max_categories }}"
          MAX_CATEGORIES=${MAX_CATEGORIES:-20}
          
          MAX_BRANDS="${{ github.event.inputs.max_brands }}"
          MAX_BRANDS=${MAX_BRANDS:-20}
          
          MAX_MODELS="${{ github.event.inputs.max_models }}"
          MAX_MODELS=${MAX_MODELS:-50}
          
          echo "=========================================="
          echo "Deploying infrastructure stack: $STACK_NAME"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Deploy Secret: ${{ github.event.inputs.deploy_secret }}"
          echo "Deploy Main App: ${{ github.event.inputs.deploy_main_app }}"
          echo "S3 Bucket: $S3_BUCKET"
          echo "S3 Key: $S3_KEY"
          echo "Max Categories: $MAX_CATEGORIES"
          echo "Max Brands: $MAX_BRANDS"
          echo "Max Models: $MAX_MODELS"
          echo "=========================================="

          # 构建基础参数
          PARAMS="Environment=${{ github.event.inputs.environment }} \
            DeploySecret=${{ github.event.inputs.deploy_secret }} \
            DeployMainApp=${{ github.event.inputs.deploy_main_app }} \
            MaxCategoriesPerRun=$MAX_CATEGORIES \
            MaxBrandsPerCategory=$MAX_BRANDS \
            MaxModelsPerBrand=$MAX_MODELS \
            LambdaCodeS3Bucket=$S3_BUCKET \
            LambdaCodeS3Key=$S3_KEY"

          # 如果部署 Secret，添加 API Key
          if [ "${{ github.event.inputs.deploy_secret }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.api_key }}" ]; then
              PARAMS="$PARAMS DeepSeekApiKey=${{ github.event.inputs.api_key }}"
              echo "✅ API Key provided"
            else
              echo "⚠️ WARNING: deploy_secret=true but no API key provided"
              echo "   Secret will be created with placeholder value"
            fi
          fi

          echo ""
          echo "📋 Parameters:"
          echo "$PARAMS" | tr ' ' '\n' | grep -v '^$'
          echo ""

          # 部署 CloudFormation 栈
          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides $PARAMS \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Build and Upload Real Lambda Code
        if: ${{ github.event.inputs.deploy_main_app == 'true' && success() }}
        run: |
          # 设置 Python 环境
          echo "🔧 Setting up Python..."
          python3 -m pip install --upgrade pip --quiet
          
          # 构建 Lambda 包
          echo "🔨 Building Lambda package..."
          BUILD_DIR="build"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          
          # 安装依赖
          echo "📦 Installing dependencies..."
          pip3 install -r requirements.txt -t "$BUILD_DIR" --platform manylinux2014_aarch64 --only-binary=:all: --python-version 3.12 --quiet
          
          # 复制 Lambda 代码
          echo "📋 Copying Lambda function..."
          cp src/lambda_function.py "$BUILD_DIR/"
          
          # 创建 ZIP 包
          echo "🗜️ Creating deployment package..."
          cd "$BUILD_DIR"
          zip -r9 ../lambda.zip . -q
          cd ..
          
          echo "✅ Build complete"
          echo "📊 Package size: $(du -h lambda.zip | cut -f1)"
          
          # 获取 S3 信息
          S3_BUCKET="${{ env.S3_BUCKET }}"
          if [ -z "$S3_BUCKET" ]; then
            S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          fi
          
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          
          echo "📤 Uploading real Lambda code to S3..."
          echo "Bucket: $S3_BUCKET"
          echo "Key: $S3_KEY"
          
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          # 更新 Lambda 函数代码
          FUNCTION_NAME="ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          
          echo "🔄 Updating Lambda function: $FUNCTION_NAME"
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "$S3_BUCKET" \
            --s3-key "$S3_KEY"
          
          echo "⏳ Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          
          echo "✅ Lambda function updated with real code"

      - name: Show Stack Outputs
        if: success()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "===== STACK OUTPUTS ====="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
          
          echo ""
          echo "===== DEPLOYMENT SUMMARY ====="
          echo "🏗️ Stack: $STACK_NAME"
          echo "📦 S3 Bucket: ${{ env.S3_BUCKET }}"
          echo "⚡ Lambda: ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          echo "🗄️ DynamoDB: ProductCatalog-${{ github.event.inputs.environment }}"
          
          # 获取并显示 Lambda 函数信息
          echo ""
          echo "===== LAMBDA FUNCTION INFO ====="
          aws lambda get-function \
            --function-name "ProductCatalog-Discovery-${{ github.event.inputs.environment }}" \
            --query '{Name:Configuration.FunctionName,Runtime:Configuration.Runtime,Memory:Configuration.MemorySize,Timeout:Configuration.Timeout,LastModified:Configuration.LastModified}' \
            --output table

      - name: Show Failed Resources
        if: failure()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo "===== FAILED EVENTS ====="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason,Timestamp]" \
            --output table
          
          echo ""
          echo "===== LAST 10 EVENTS ====="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --max-items 10 \
            --query "StackEvents[].[LogicalResourceId,ResourceStatus,ResourceStatusReason,Timestamp]" \
            --output table

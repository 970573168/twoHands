name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

      deploy_secret:
        description: "Deploy API Secret?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      deploy_main_app:
        description: "Deploy Main Application?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      api_key:
        description: "API Key (required if deploy_secret=true)"
        required: false
        type: string

      s3_bucket:
        description: "S3 bucket name for Lambda code"
        required: true
        default: "productcatalog-lambda-code"
        type: string

      max_categories:
        description: "Max categories per run"
        required: false
        default: "20"
        type: string

      max_brands:
        description: "Max brands per category"
        required: false
        default: "20"
        type: string

      max_models:
        description: "Max models per brand"
        required: false
        default: "50"
        type: string

      max_total_tokens:
        description: "Max total tokens per run"
        required: false
        default: "100000"
        type: string

      lambda_timeout_buffer:
        description: "Lambda timeout buffer seconds"
        required: false
        default: "30"
        type: string

      api_call_delay:
        description: "API call delay seconds"
        required: false
        default: "1"
        type: string

      category_limit:
        description: "Max categories to process"
        required: false
        default: "5"
        type: string

      brand_limit:
        description: "Max brands to process per category"
        required: false
        default: "3"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Prepare Deployment Variables
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET_BASE="${{ github.event.inputs.s3_bucket }}"
          S3_BUCKET="${S3_BUCKET_BASE}-${AWS_ACCOUNT_ID}"

          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> "$GITHUB_ENV"
          echo "AWS_REGION=ap-northeast-1" >> "$GITHUB_ENV"
          echo "S3_BUCKET=$S3_BUCKET" >> "$GITHUB_ENV"

      - name: Create S3 Bucket if not exists
        if: ${{ github.event.inputs.deploy_main_app == 'true' }}
        run: |
          if ! aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$S3_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi
          aws s3api put-bucket-versioning --bucket "$S3_BUCKET" --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "$S3_BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-public-access-block --bucket "$S3_BUCKET" --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Build and Upload Lambda Code
        if: ${{ github.event.inputs.deploy_main_app == 'true' }}
        run: |
          BUILD_DIR="build"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          pip3 install -r requirements.txt -t "$BUILD_DIR" --platform manylinux2014_aarch64 --only-binary=:all: --python-version 3.12 --quiet
          cp src/lambda_function.py "$BUILD_DIR/"
          cd "$BUILD_DIR"
          zip -r9 ../lambda.zip . -q
          cd ..
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_KEY="productcatalog/lambda-${TIMESTAMP}.zip"
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          echo "S3_KEY=$S3_KEY" >> "$GITHUB_ENV"

      - name: Validate Template
        run: |
          aws cloudformation validate-template --template-body file://cloudformation/productcatalog.yaml

      - name: Deploy Stack
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"

          PARAMS=(
            "Environment=${{ github.event.inputs.environment }}"
            "DeploySecret=${{ github.event.inputs.deploy_secret }}"
            "DeployMainApp=${{ github.event.inputs.deploy_main_app }}"
            "MaxCategoriesPerRun=${{ github.event.inputs.max_categories }}"
            "MaxBrandsPerCategory=${{ github.event.inputs.max_brands }}"
            "MaxModelsPerBrand=${{ github.event.inputs.max_models }}"
            "MaxTotalTokens=${{ github.event.inputs.max_total_tokens }}"
            "LambdaTimeoutBuffer=${{ github.event.inputs.lambda_timeout_buffer }}"
            "ApiCallDelay=${{ github.event.inputs.api_call_delay }}"
            "CategoryLimit=${{ github.event.inputs.category_limit }}"
            "BrandLimit=${{ github.event.inputs.brand_limit }}"
            "LambdaCodeS3Bucket=$S3_BUCKET"
            "LambdaCodeS3Key=${S3_KEY:-productcatalog/lambda-placeholder.zip}"
          )

          if [ "${{ github.event.inputs.deploy_secret }}" = "true" ] && [ -n "${{ github.event.inputs.api_key }}" ]; then
            PARAMS+=("DeepSeekApiKey=${{ github.event.inputs.api_key }}")
          fi

          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides "${PARAMS[@]}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show Stack Outputs
        if: success()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs' --output table

      - name: Show Failed Resources
        if: failure()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          aws cloudformation describe-stack-events --stack-name "$STACK_NAME" --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason,Timestamp]" --output table

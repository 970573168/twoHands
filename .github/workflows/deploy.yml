name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      
      deploy_secret:
        description: 'Deploy DeepSeek Secret?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      
      deploy_main_app:
        description: 'Deploy Main Application?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      
      api_key:
        description: 'DeepSeek API Key (required if deploy_secret=true)'
        required: false
        type: string
      
      s3_bucket:
        description: 'S3 bucket for Lambda code'
        required: true
        default: 'productcatalog-lambda-code'
        type: string
      
      max_categories:
        description: 'Max categories per run'
        required: false
        default: '20'
        type: string
      
      max_brands:
        description: 'Max brands per category'
        required: false
        default: '20'
        type: string
      
      max_models:
        description: 'Max models per brand'
        required: false
        default: '50'
        type: string

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    # ✅ 修复1：permissions 必须在 job 层级，不能在顶层
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 修复2：添加 Python 环境设置
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ✅ 修复3：添加调试步骤，帮助排查问题
      - name: Debug Inputs
        run: |
          echo "=========================================="
          echo "🔍 Debug Information"
          echo "=========================================="
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Deploy Secret: ${{ github.event.inputs.deploy_secret }}"
          echo "Deploy Main App: ${{ github.event.inputs.deploy_main_app }}"
          echo "S3 Bucket: ${{ github.event.inputs.s3_bucket }}"
          echo "Max Categories: ${{ github.event.inputs.max_categories }}"
          echo "Max Brands: ${{ github.event.inputs.max_brands }}"
          echo "Max Models: ${{ github.event.inputs.max_models }}"
          echo "API Key Provided: ${{ github.event.inputs.api_key != '' }}"
          echo "Runner OS: $(uname -a)"
          echo "Runner Arch: $(uname -m)"
          echo "Python Version: $(python3 --version)"
          echo "AWS CLI Version: $(aws --version 2>/dev/null || echo 'Not installed yet')"
          echo "=========================================="

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767076981380:role/twoHands-GitHubActions-Role
          aws-region: ap-northeast-1
          # ✅ 修复4：添加 session 标记，便于审计
          role-session-name: GitHubActions-${{ github.event.inputs.environment }}

      - name: Verify AWS Identity
        run: |
          echo "🔍 Verifying AWS Identity..."
          aws sts get-caller-identity
          echo "✅ AWS Identity verified successfully"

      - name: Create S3 Bucket and Upload Placeholder
        if: ${{ github.event.inputs.deploy_main_app == 'true' }}
        run: |
          set -e  # ✅ 修复5：遇到错误立即停止
          
          S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          
          echo "🔍 Checking if S3 bucket exists: $S3_BUCKET"
          
          # 检查存储桶是否存在
          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "✅ S3 bucket already exists: $S3_BUCKET"
          else
            echo "📦 Creating S3 bucket: $S3_BUCKET"
            
            # 创建存储桶
            aws s3api create-bucket \
              --bucket "$S3_BUCKET" \
              --region ap-northeast-1 \
              --create-bucket-configuration LocationConstraint=ap-northeast-1
            
            # 启用版本控制
            aws s3api put-bucket-versioning \
              --bucket "$S3_BUCKET" \
              --versioning-configuration Status=Enabled
            
            # 启用加密
            aws s3api put-bucket-encryption \
              --bucket "$S3_BUCKET" \
              --server-side-encryption-configuration '{
                "Rules": [
                  {
                    "ApplyServerSideEncryptionByDefault": {
                      "SSEAlgorithm": "AES256"
                    }
                  }
                ]
              }'
            
            # 阻止公共访问
            aws s3api put-public-access-block \
              --bucket "$S3_BUCKET" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            
            echo "✅ S3 bucket created successfully: $S3_BUCKET"
          fi
          
          # 创建占位 Lambda 代码
          echo "📝 Creating placeholder Lambda code..."
          mkdir -p /tmp/lambda_placeholder
          cat > /tmp/lambda_placeholder/lambda_function.py << 'EOF'
import json

def lambda_handler(event, context):
    return {
        'statusCode': 200,
        'body': json.dumps({'message': 'Placeholder - will be updated with real code'})
    }
EOF
          
          # 打包占位代码
          cd /tmp/lambda_placeholder
          zip -r9 /tmp/lambda.zip . -q
          cd -
          
          # 上传占位代码到 S3
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          echo "📤 Uploading placeholder code to s3://$S3_BUCKET/$S3_KEY"
          aws s3 cp /tmp/lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          echo "✅ Placeholder code uploaded"
          
          # 保存到环境变量
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          echo "S3_KEY=$S3_KEY" >> $GITHUB_ENV

      - name: Validate CloudFormation Template
        run: |
          echo "🔍 Validating CloudFormation template..."
          
          # ✅ 修复6：检查模板文件是否存在
          if [ ! -f "cloudformation/productcatalog.yaml" ]; then
            echo "❌ ERROR: CloudFormation template not found: cloudformation/productcatalog.yaml"
            echo "Current directory: $(pwd)"
            echo "Files in cloudformation/:"
            ls -la cloudformation/ 2>/dev/null || echo "cloudformation/ directory not found"
            exit 1
          fi
          
          aws cloudformation validate-template \
            --template-body file://cloudformation/productcatalog.yaml
          
          echo "✅ CloudFormation template is valid"

      - name: Deploy CloudFormation Stack
        run: |
          set -e  # ✅ 遇到错误立即停止
          
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          # 获取 S3 信息
          S3_BUCKET="${{ env.S3_BUCKET }}"
          S3_KEY="${{ env.S3_KEY }}"
          
          if [ -z "$S3_BUCKET" ]; then
            S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          fi
          if [ -z "$S3_KEY" ]; then
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          fi
          
          # 设置数值参数默认值
          MAX_CATEGORIES="${{ github.event.inputs.max_categories }}"
          MAX_CATEGORIES=${MAX_CATEGORIES:-20}
          
          MAX_BRANDS="${{ github.event.inputs.max_brands }}"
          MAX_BRANDS=${MAX_BRANDS:-20}
          
          MAX_MODELS="${{ github.event.inputs.max_models }}"
          MAX_MODELS=${MAX_MODELS:-50}
          
          echo "=========================================="
          echo "Deploying CloudFormation Stack"
          echo "Stack Name: $STACK_NAME"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "S3 Bucket: $S3_BUCKET"
          echo "S3 Key: $S3_KEY"
          echo "Max Categories: $MAX_CATEGORIES"
          echo "Max Brands: $MAX_BRANDS"
          echo "Max Models: $MAX_MODELS"
          echo "=========================================="
          
          # 构建参数
          PARAMS="Environment=${{ github.event.inputs.environment }} \
            DeploySecret=${{ github.event.inputs.deploy_secret }} \
            DeployMainApp=${{ github.event.inputs.deploy_main_app }} \
            MaxCategoriesPerRun=$MAX_CATEGORIES \
            MaxBrandsPerCategory=$MAX_BRANDS \
            MaxModelsPerBrand=$MAX_MODELS \
            LambdaCodeS3Bucket=$S3_BUCKET \
            LambdaCodeS3Key=$S3_KEY"
          
          # 如果部署 Secret，添加 API Key
          if [ "${{ github.event.inputs.deploy_secret }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.api_key }}" ]; then
              PARAMS="$PARAMS DeepSeekApiKey=${{ github.event.inputs.api_key }}"
              echo "✅ API Key provided"
            else
              echo "⚠️  WARNING: deploy_secret=true but no API key provided"
              echo "   Secret will be created with placeholder value"
            fi
          fi
          
          echo ""
          echo "📋 Parameters:"
          echo "$PARAMS" | tr ' ' '\n' | grep -v '^$'
          echo ""
          
          # 部署栈
          aws cloudformation deploy \
            --template-file cloudformation/productcatalog.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides $PARAMS \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
          
          echo "✅ CloudFormation stack deployment completed"

      - name: Build and Deploy Real Lambda Code
        if: ${{ github.event.inputs.deploy_main_app == 'true' && success() }}
        run: |
          set -e  # ✅ 遇到错误立即停止
          
          echo "🔨 Building real Lambda package..."
          
          # ✅ 修复7：检查 requirements.txt 是否存在
          if [ ! -f "requirements.txt" ]; then
            echo "⚠️  WARNING: requirements.txt not found"
            echo "Creating empty requirements.txt..."
            touch requirements.txt
          fi
          
          # ✅ 修复8：检查 Lambda 函数源文件是否存在
          if [ ! -f "src/lambda_function.py" ]; then
            echo "❌ ERROR: Lambda function source not found: src/lambda_function.py"
            echo "Current directory: $(pwd)"
            echo "Files in src/:"
            ls -la src/ 2>/dev/null || echo "src/ directory not found"
            exit 1
          fi
          
          # 安装依赖
          BUILD_DIR="build"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          
          echo "📦 Installing Python dependencies..."
          # ✅ 修复9：根据 Lambda 架构选择正确的平台
          # 如果使用 x86_64 Lambda，请使用 manylinux2014_x86_64
          # 如果使用 ARM (Graviton) Lambda，请使用 manylinux2014_aarch64
          pip3 install -r requirements.txt -t "$BUILD_DIR" \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --python-version 3.12 \
            --quiet || {
              echo "⚠️  Platform-specific install failed, trying generic install..."
              pip3 install -r requirements.txt -t "$BUILD_DIR" --quiet
            }
          
          echo "📋 Copying Lambda function code..."
          cp src/lambda_function.py "$BUILD_DIR/"
          
          # ✅ 修复10：复制其他必要的源文件
          if [ -d "src" ]; then
            echo "📋 Copying additional source files..."
            cp -r src/* "$BUILD_DIR/" 2>/dev/null || true
          fi
          
          echo "🗜️  Creating deployment package..."
          cd "$BUILD_DIR"
          zip -r9 ../lambda.zip . -q
          cd ..
          
          echo "✅ Build complete"
          echo "📊 Package size: $(du -h lambda.zip | cut -f1)"
          
          # 上传到 S3
          S3_BUCKET="${{ env.S3_BUCKET }}"
          if [ -z "$S3_BUCKET" ]; then
            S3_BUCKET="${{ github.event.inputs.s3_bucket }}"
          fi
          
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          S3_KEY="productcatalog/lambda-$TIMESTAMP.zip"
          
          echo "📤 Uploading real code to S3..."
          echo "Bucket: $S3_BUCKET"
          echo "Key: $S3_KEY"
          
          aws s3 cp lambda.zip "s3://$S3_BUCKET/$S3_KEY"
          
          # 更新 Lambda 函数
          FUNCTION_NAME="ProductCatalog-Discovery-${{ github.event.inputs.environment }}"
          
          echo "🔄 Updating Lambda function: $FUNCTION_NAME"
          
          # ✅ 修复11：检查 Lambda 函数是否存在
          if aws lambda get-function --function-name "$FUNCTION_NAME" 2>/dev/null; then
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --s3-bucket "$S3_BUCKET" \
              --s3-key "$S3_KEY"
            
            echo "⏳ Waiting for Lambda update to complete..."
            aws lambda wait function-updated \
              --function-name "$FUNCTION_NAME"
            
            echo "✅ Lambda function updated successfully!"
          else
            echo "⚠️  WARNING: Lambda function $FUNCTION_NAME not found"
            echo "   It should be created by CloudFormation stack"
          fi

      - name: Show Deployment Results
        if: success()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo ""
          echo "=========================================="
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "=========================================="
          echo ""
          echo "📋 Stack Outputs:"
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table 2>/dev/null || echo "No outputs available"
          
          echo ""
          echo "⚡ Lambda Function Info:"
          aws lambda get-function \
            --function-name "ProductCatalog-Discovery-${{ github.event.inputs.environment }}" \
            --query 'Configuration.{Name:FunctionName,Runtime:Runtime,Memory:MemorySize,Timeout:Timeout,LastModified:LastModified}' \
            --output table 2>/dev/null || echo "Lambda function not found"
          
          echo ""
          echo "🔗 Useful Commands:"
          echo "  Test Lambda:"
          echo "    aws lambda invoke --function-name ProductCatalog-Discovery-${{ github.event.inputs.environment }} --payload '{\"task_type\":\"DISCOVER_CATEGORIES\"}' response.json"
          echo ""
          echo "  View Logs:"
          echo "    aws logs tail /aws/lambda/ProductCatalog-Discovery-${{ github.event.inputs.environment }} --follow"

      - name: Show Failed Resources
        if: failure()
        run: |
          STACK_NAME="productcatalog-app-${{ github.event.inputs.environment }}"
          
          echo ""
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED!"
          echo "=========================================="
          echo ""
          
          # ✅ 修复12：安全地获取失败信息
          echo "Failed Resources:"
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query "StackEvents[?contains(ResourceStatus,'FAILED')].[LogicalResourceId,ResourceStatus,ResourceStatusReason]" \
            --output table 2>/dev/null || echo "Unable to get stack events"
          
          echo ""
          echo "Recent Events:"
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --max-items 10 \
            --query "StackEvents[].[LogicalResourceId,ResourceStatus,Timestamp]" \
            --output table 2>/dev/null || echo "Unable to get recent events"
          
          echo ""
          echo "🔍 Troubleshooting Tips:"
          echo "1. Check CloudFormation console for detailed error messages"
          echo "2. Verify IAM permissions are sufficient"
          echo "3. Check S3 bucket exists and is accessible"
          echo "4. Review CloudWatch Logs for Lambda errors"
